  <title>GOAL! World Cup Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0f; color: #f0f0f5; margin: 0; min-height: 100vh; }
    .font-dm { font-family: 'DM Sans', sans-serif; }
    .font-mono-stat { font-family: 'Space Mono', monospace; }
    .font-8bit { font-family: 'Press Start 2P', monospace; }

    /* Lobby hero */
    .hero-title { font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: clamp(2.2rem, 8vw, 3.4rem); letter-spacing: -1.5px; line-height: 1; }
    .hero-go { color: #f0f0f5; }
    .hero-al { color: #e23b4e; }
    .hero-edition { font-family: 'Space Mono', monospace; font-weight: 700; font-size: clamp(0.6rem, 2vw, 0.8rem); letter-spacing: 0.28em; color: #fbbf24; text-transform: uppercase; vertical-align: super; margin-left: 6px; }
    .hero-sub { font-family: 'Space Grotesk', sans-serif; color: #9ca3af; font-size: 0.95rem; margin-top: 6px; }

    /* Nation flag card */
    .nation-card {
      border-radius: 12px; overflow: hidden; cursor: pointer; position: relative;
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s, border-color 0.18s;
      aspect-ratio: 3/2; background: #11131c;
    }
    .nation-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 0 0 2px #fbbf24, 0 12px 32px rgba(251,191,36,0.35); border-color: #fbbf24; }
    .nation-card:active { transform: translateY(-2px) scale(0.99); }
    .nation-card .flag-area { position: absolute; inset: 0; background-size: cover; background-position: center; }
    .nation-card .flag-area::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.78) 100%); }
    .nation-card .name-area { position: absolute; left: 0; right: 0; bottom: 0; padding: 8px 6px; text-align: center; color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 0.9rem; text-shadow: 0 1px 4px rgba(0,0,0,0.9); z-index: 2; }

    /* HUD chips */
    .hud-chip {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; color: #aaa; text-align: center; flex: 1;
    }
    .hud-chip .val { font-family: 'Space Mono', monospace; font-size: 1rem; color: #f0f0f5; font-weight: 700; display: block; }
    .pot-chip {
      border-color: rgba(251,191,36,0.5) !important;
      box-shadow: 0 0 8px rgba(251,191,36,0.2);
      font-size: 0.85rem !important;
    }
    .pot-chip .val { font-size: 1.1rem !important; color: #fbbf24 !important; }

    @keyframes pot-heartbeat {
      0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,0.2); }
      50% { box-shadow: 0 0 20px rgba(251,191,36,0.6), 0 0 40px rgba(251,191,36,0.2); }
    }
    .pot-heartbeat { animation: pot-heartbeat 3s ease-in-out infinite; }

    @keyframes pot-pulse-ring {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* Game board — sized so all 64 tiles are always on screen, no scroll.
       Width is the smaller of available width and available height (minus the
       header/HUD/strip/controls reserved above & below), kept square via aspect-ratio. */
    .board-zone {
      flex: 1 1 auto; min-height: 0; position: relative; overflow: hidden;
      background-size: cover; background-position: center; background-repeat: no-repeat;
      display: flex; align-items: center; justify-content: center; padding: 8px;
    }
    .board-zone::before { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.32); }
    .game-grid-wrapper {
      position: relative; z-index: 1;
      width: min(94vw, calc(100vh - 290px));
      aspect-ratio: 1;
      max-height: 100%;
    }
    .game-grid {
      width: 100%; height: 100%;
      display: grid; grid-template-columns: repeat(8, 1fr); grid-template-rows: repeat(8, 1fr);
      gap: 5px; padding: 5px;
      background-size: cover; background-position: center; background-repeat: no-repeat;
      border-radius: 12px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.06);
    }
    .cell {
      cursor: pointer; border-radius: 7px; position: relative;
      transition: transform 0.12s ease, opacity 0.12s ease;
      border: 1.5px solid rgba(255,255,255,0.45);
      box-shadow: inset 0 2px 5px rgba(255,255,255,0.45), inset 0 -3px 7px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.35);
      backdrop-filter: blur(2px);
      background-image: linear-gradient(135deg, rgba(255,255,255,0.28) 0%, rgba(255,255,255,0) 45%);
    }
    .cell:hover:not(.revealed) { transform: scale(0.9); filter: brightness(1.15); }
    .cell.revealed { background: transparent !important; background-image: none !important; box-shadow: none !important; border: none !important; cursor: default; pointer-events: none; backdrop-filter: none !important; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-5px); }
      60% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.8s ease-in-out; }

    /* Slower, more satisfying per-tile reveal */
    @keyframes dissolve {
      0% { opacity: 1; transform: scale(1) rotate(0deg); }
      40% { opacity: 0.85; transform: scale(1.04) rotate(-2deg); }
      100% { opacity: 0; transform: scale(0.4) rotate(6deg); }
    }
    .dissolving { animation: dissolve 0.6s cubic-bezier(.4,0,.2,1) forwards; }

    /* Nation strip */
    .nation-strip { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; color: #ccc; display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(0,0,0,0.4); }
    .flag-mini { width: 24px; height: 16px; border-radius: 2px; display: inline-block; flex-shrink: 0; }

    /* Controls */
    .bundle-btn {
      font-family: 'DM Sans', sans-serif; font-weight: 600; border: none; border-radius: 8px;
      padding: 12px 20px; cursor: pointer; font-size: 0.95rem; transition: transform 0.1s, opacity 0.1s;
    }
    .bundle-btn:hover { transform: scale(1.03); }
    .bundle-btn:active { transform: scale(0.97); }
    .btn-gold { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
    .btn-green { background: linear-gradient(135deg, #10b981, #059669); color: white; }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: rgba(10,10,15,0.95); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header-logo { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1.3rem; color: #fbbf24; text-decoration: none; letter-spacing: -0.5px; }
    .header-btns { display: flex; align-items: center; gap: 2px; }
    .header-btn {
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 6px 10px;
      background: none; border: none; color: #aaa; cursor: pointer; border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .header-btn:hover { color: white; background: rgba(255,255,255,0.08); }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 2px; }

    /* Toast */
    #toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
    .toast { font-family: 'DM Sans', sans-serif; background: rgba(30,30,40,0.97); border: 1px solid rgba(251,191,36,0.4); border-radius: 10px; padding: 12px 20px; color: white; font-size: 0.9rem; animation: toast-in 0.3s ease; max-width: 340px; text-align: center; }
    @keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* Win overlay */
    .win-overlay { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
    .board-dim { position: absolute; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 40; }

    /* Result card */
    .result-card { background: rgba(15,15,25,0.97); border: 1px solid rgba(251,191,36,0.5); border-radius: 16px; padding: 28px; text-align: center; max-width: 340px; width: 90%; box-shadow: 0 0 40px rgba(251,191,36,0.2); }

    /* League table */
    .league-table { width: 100%; border-collapse: collapse; }
    .league-table th { font-family: 'DM Sans', sans-serif; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .league-table td { font-family: 'Space Mono', monospace; font-size: 0.85rem; padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .league-table tr:last-child td { border-bottom: none; }
    .league-rank { color: #888; font-size: 0.75rem; }
    .league-name { font-family: 'DM Sans', sans-serif; color: #f0f0f5; font-size: 0.9rem; }
    .league-score { color: #fbbf24; text-align: right; }
    .my-row { background: rgba(251,191,36,0.05); }

    /* Victory Stadium */
    #victory-bg { background: linear-gradient(180deg, #0d1b2a 0%, #0d1b2a 55%, #1a6b1a 55%, #1a6b1a 100%); min-height: 100vh; }
    @keyframes wave { 0%,100% { transform: skewX(-2deg); } 50% { transform: skewX(2deg); } }
    .flag-wave { animation: wave 1.2s ease-in-out infinite; transform-origin: bottom center; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .fan-bob { animation: bob 0.8s ease-in-out infinite; }

    /* FAQ */
    .faq-section { margin-bottom: 32px; }
    .faq-section h2 { font-size: 1.1rem; font-weight: 700; color: #fbbf24; margin-bottom: 12px; }
    .faq-section p, .faq-section li { color: #ccc; line-height: 1.7; font-size: 0.9rem; }
    .faq-section ul { padding-left: 20px; margin: 8px 0; }
    .faq-section pre { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px; font-family: 'Space Mono', monospace; font-size: 0.78rem; color: #aaa; overflow-x: auto; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    /* Floating delta label */
    .pot-delta { position: absolute; font-family: 'Space Mono', monospace; font-size: 0.75rem; color: #fbbf24; font-weight: 700; pointer-events: none; animation: float-up 0.8s ease forwards; white-space: nowrap; }
    @keyframes float-up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-30px); } }

    /* Modal */
    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #1a1a2e; border: 1px solid rgba(255,255,255,0.15); border-radius: 14px; padding: 24px; max-width: 340px; width: 90%; text-align: center; }

    /* Lobby sections */
    .section-title { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 1.1rem; color: #f0f0f5; margin-bottom: 14px; }
    .or-divider { display: flex; align-items: center; gap: 12px; margin: 24px 0; color: #555; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; }
    .or-divider::before, .or-divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }

    .credits-chip { background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.4); border-radius: 8px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; color: #fbbf24; font-weight: 600; text-align: center; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="toast-container"></div>

  <script>
  // ═══════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════
  const params = new URLSearchParams(location.search);
  const TOKEN = params.get('token') || '';
  const HEADERS = () => ({
    'Content-Type': 'application/json',
    ...(TOKEN ? { 'x-usernode-token': TOKEN } : {})
  });

  const STAGES = ['Group Match 1','Group Match 2','Group Match 3','Round of 16','Quarter-Final','Semi-Final','Final'];
  const QUIPS = ['Keeper saves it!','Over the bar!','Wide of the post!','Just a warm-up!','The crowd groans!','Close, but no cigar!','Offside — play on!','The woodwork rattles!','Into the wall!','Try again!'];

  let state = {
    session: null, walletBalance: 1000, potBalance: 100,
    potLastWonAt: null, leaderState: null,
    game: null, gameTheme: null, credits: null,
    squaresRevealed: 0, prizePot: 149,
    themes: [], polls: [],
    prevPotBalance: 100,
  };

  // ═══════════════════════════════════════════════════════════════
  // API
  // ═══════════════════════════════════════════════════════════════
  async function api(method, path, body) {
    const opts = { method, headers: HEADERS() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(path, opts);
    return r;
  }

  // ═══════════════════════════════════════════════════════════════
  // UTILITIES
  // ═══════════════════════════════════════════════════════════════
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  function prizeDecay(n) {
    return Math.max(8, Math.floor(150 / (1 + Math.exp(0.12 * (n - 40)))));
  }
  function flagGradient(accent) {
    return `linear-gradient(135deg, ${accent} 0%, ${hexToRgba(accent,0.6)} 100%)`;
  }
  function bgWithFallback(imagePath, accent) {
    return `url('${imagePath}'), ${flagGradient(accent)}`;
  }
  function stageName(idx) { return STAGES[idx] || 'Final'; }
  function clearPolls() { state.polls.forEach(id => clearInterval(id)); state.polls = []; }

  // CSS flag representations (flag-forward styling; real flag art deferred).
  const FLAGS = {
    france: 'linear-gradient(90deg,#0055A4 0 33.33%,#fff 33.33% 66.66%,#EF4135 66.66%)',
    brazil: 'radial-gradient(circle at 50% 50%, #FEDF00 0 30%, transparent 31%), linear-gradient(135deg,#009C3B,#007a2e)',
    england: 'linear-gradient(#CF142B,#CF142B) center/100% 22% no-repeat, linear-gradient(#CF142B,#CF142B) center/22% 100% no-repeat, #fff',
    spain: 'linear-gradient(180deg,#AA151B 0 25%,#F1BF00 25% 75%,#AA151B 75%)',
    argentina: 'linear-gradient(180deg,#74ACDF 0 33.33%,#fff 33.33% 66.66%,#74ACDF 66.66%)',
    morocco: 'radial-gradient(circle at 50% 50%, #006233 0 16%, transparent 17%), #C1272D',
    usa: 'linear-gradient(#3C3B6E,#3C3B6E) top left/42% 54% no-repeat, repeating-linear-gradient(#B22234 0 7.69%,#fff 7.69% 15.38%)',
    turkey: 'radial-gradient(circle at 42% 50%, #fff 0 16%, transparent 16%), #E30A17',
    belgium: 'linear-gradient(90deg,#000 0 33.33%,#FAE042 33.33% 66.66%,#ED2939 66.66%)',
    egypt: 'linear-gradient(180deg,#CE1126 0 33.33%,#fff 33.33% 66.66%,#000 66.66%)',
    portugal: 'linear-gradient(90deg,#006600 0 40%,#FF0000 40%)',
    netherlands: 'linear-gradient(180deg,#AE1C28 0 33.33%,#fff 33.33% 66.66%,#21468B 66.66%)',
    norway: 'linear-gradient(#002868,#002868) center/100% 22% no-repeat, linear-gradient(#002868,#002868) 36% 0/12% 100% no-repeat, linear-gradient(#fff,#fff) center/100% 44% no-repeat, linear-gradient(#fff,#fff) 36% 0/24% 100% no-repeat, #EF2B2D',
    germany: 'linear-gradient(180deg,#000 0 33.33%,#DD0000 33.33% 66.66%,#FFCE00 66.66%)',
  };
  function flagBg(slug, accent) { return FLAGS[slug] || flagGradient(accent); }
  // Board backdrop: real theme photo if present, else the CSS flag.
  function boardBackdrop(slug, accent) { return `url('/images/themes/${slug}.png'), ${flagBg(slug, accent)}`; }

  // ═══════════════════════════════════════════════════════════════
  // SOUND — NES/8-bit synth via Web Audio API (no audio files)
  // ═══════════════════════════════════════════════════════════════
  const Sound = {
    ctx: null,
    muted: (function(){ try { return localStorage.getItem('goal_muted') === '1'; } catch(_) { return false; } })(),
    ensure() {
      if (this.muted) return null;
      try {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') this.ctx.resume();
        return this.ctx;
      } catch(_) { return null; }
    },
    tone(freq, start, dur, type, gain) {
      const ctx = this.ctx; if (!ctx) return;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(gain || 0.18, start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(start); osc.stop(start + dur + 0.02);
    },
    blip() {
      const ctx = this.ensure(); if (!ctx) return;
      const t = ctx.currentTime;
      this.tone(660, t, 0.08, 'square', 0.16);
      this.tone(990, t + 0.04, 0.06, 'square', 0.12);
    },
    victory() {
      const ctx = this.ensure(); if (!ctx) return;
      const t = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; // C5 E5 G5 C6 E6
      notes.forEach((f, i) => this.tone(f, t + i * 0.12, 0.16, 'square', 0.18));
      this.tone(1046.50, t + 0.6, 0.32, 'triangle', 0.2);
    },
    toggle() {
      this.muted = !this.muted;
      try { localStorage.setItem('goal_muted', this.muted ? '1' : '0'); } catch(_) {}
      if (!this.muted) this.ensure();
      updateMuteButtons();
      return this.muted;
    }
  };
  function playBlip() { Sound.blip(); }
  function playVictoryJingle() { Sound.victory(); }
  window.toggleMute = function() { Sound.toggle(); };
  function muteIcon() { return Sound.muted ? '🔇' : '🔊'; }
  function updateMuteButtons() {
    document.querySelectorAll('.mute-btn').forEach(b => {
      b.innerHTML = 'Mute ' + muteIcon();
      b.style.opacity = Sound.muted ? '0.55' : '1';
    });
  }

  // ═══════════════════════════════════════════════════════════════
  // TOAST
  // ═══════════════════════════════════════════════════════════════
  function showToast(msg, duration) {
    duration = duration || 5000;
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, duration);
  }

  // ═══════════════════════════════════════════════════════════════
  // CAPTAIN'S POT ANIMATION
  // ═══════════════════════════════════════════════════════════════
  function animatePotValue(el, from, to, ms) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / ms, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * ease).toLocaleString() + ' t';
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function firePotPulse(chip) {
    const ring = document.createElement('div');
    ring.style.cssText = `position:absolute;inset:0;border-radius:8px;border:2px solid #fbbf24;animation:pot-pulse-ring 0.4s ease forwards;pointer-events:none;`;
    chip.style.position = 'relative';
    chip.appendChild(ring);
    setTimeout(() => ring.remove(), 450);
  }
  function firePotDelta(chip, delta) {
    const lbl = document.createElement('div');
    lbl.className = 'pot-delta';
    lbl.textContent = `⚡ +${delta.toFixed(1)}`;
    lbl.style.cssText = 'top:-10px;left:50%;transform:translateX(-50%);';
    chip.style.position = 'relative';
    chip.appendChild(lbl);
    setTimeout(() => lbl.remove(), 900);
  }
  function updatePotChips(newBalance, newLastWonAt) {
    const prev = state.prevPotBalance;
    const jackpotHit = newLastWonAt && newLastWonAt !== state.potLastWonAt;

    document.querySelectorAll('.pot-chip-value').forEach(el => {
      const chip = el.closest('.pot-chip');
      if (jackpotHit) {
        animatePotValue(el, prev, 0, 1000);
        setTimeout(() => { animatePotValue(el, 0, newBalance, 500); }, 1000);
        if (chip) { setTimeout(() => { chip.style.background = 'white'; setTimeout(() => { chip.style.background = ''; }, 200); }, 1000); }
      } else if (newBalance > prev + 0.01) {
        animatePotValue(el, prev, newBalance, 600);
        if (chip) { firePotPulse(chip); firePotDelta(chip, newBalance - prev); }
      } else {
        el.textContent = Math.round(newBalance).toLocaleString() + ' t';
      }
      if (chip) {
        if (newBalance > 500) chip.classList.add('pot-heartbeat');
        else chip.classList.remove('pot-heartbeat');
      }
    });

    if (jackpotHit) {
      showToast("⚡ JACKPOT! Someone just won the Captain's Pot!");
      state.potLastWonAt = newLastWonAt;
    }
    state.prevPotBalance = newBalance;
    state.potBalance = newBalance;
  }

  // ═══════════════════════════════════════════════════════════════
  // CONFETTI
  // ═══════════════════════════════════════════════════════════════
  let confettiLoop = null;
  function startConfetti() {
    if (confettiLoop) return;
    confettiLoop = setInterval(() => {
      confetti({ particleCount: 6, spread: 70, origin: { y: 0.4 }, colors: ['#fbbf24','#10b981','#3b82f6','#ef4444','#8b5cf6'] });
    }, 200);
  }
  function stopConfetti() {
    if (confettiLoop) { clearInterval(confettiLoop); confettiLoop = null; }
  }

  // ═══════════════════════════════════════════════════════════════
  // ROUTING
  // ═══════════════════════════════════════════════════════════════
  function navigate(hash) { location.hash = hash; }
  function route() {
    clearPolls();
    stopConfetti();
    const hash = location.hash || '#lobby';
    if (hash === '#lobby' || hash === '#') renderLobby();
    else if (hash.startsWith('#game/')) renderGame(hash.replace('#game/', ''));
    else if (hash === '#league') renderLeague();
    else if (hash === '#faq') renderFaq();
    else renderLobby();

  // LOBBY
  // ═══════════════════════════════════════════════════════════════
  async function renderLobby() {
    const app = document.getElementById('app');
    app.innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;">
      ${renderHeader()}
      <div id="lobby-body" style="flex:1;max-width:900px;margin:0 auto;padding:20px 16px;width:100%;">
        <div style="text-align:center;padding:40px 0;color:#555;">Loading...</div>
      </div>
    </div>`;
    await loadLobby();
  }

  async function loadLobby() {
    const body = document.getElementById('lobby-body');
    function showLobbyError(msg) {
      console.error('Lobby error:', msg);
      if (body) body.innerHTML = `<p style="text-align:center;color:#f87171;padding:40px;font-family:'DM Sans',sans-serif;">Error loading lobby: ${msg}</p>`;
    }
    try {
      const sessionRes = await api('GET', '/api/session');
      if (!sessionRes.ok) {
        let detail = 'HTTP ' + sessionRes.status;
        try { const e = await sessionRes.json(); if (e && e.error) detail += ' — ' + e.error; } catch(_) {}
        showLobbyError(detail);
        return;
      }
      const data = await sessionRes.json();
      const session = data.session;
      const captain_pot_balance = data.captain_pot_balance;
      const wallet_balance = data.wallet_balance;
      state.session = session;
      state.walletBalance = wallet_balance || 1000;
      state.potBalance = captain_pot_balance || 100;
      state.prevPotBalance = state.potBalance;

      renderLobbyBody(session);
      setupLobbyPolls();
    } catch(e) {
      showLobbyError(e && e.message ? e.message : String(e));
    }
  }

    const body = document.getElementById('lobby-body');
    if (!body) return;
    const hasActiveSession = session && !session.session_complete && session.current_game_id;

      <div style="display:flex;justify-content:flex-end;gap:10px;margin-bottom:18px;">

        <h1 class="hero-title"><span class="hero-go">GO</span><span class="hero-al">AL!</span><span class="hero-edition">World Cup Edition</span></h1>

        <p class="hero-sub" style="margin-bottom:18px;">${session && session.session_complete ? '🏆 Champions! Pick a nation to start a fresh tournament.' : 'Win seven matches — three group games, then the knockouts — to lift the cup.'}</p>

        &nbsp;·&nbsp;

  function setupLobbyPolls() {
    state.polls.push(setInterval(async () => {
      try {
        const r = await api('GET', '/api/captain-pot');
        if (!r.ok) return;
        const d = await r.json();
        updatePotChips(d.balance, d.last_won_at);
      } catch {}
    }, 5000));

      const e = await r.json().catch(()=>({}));

  // GAME BOARD
  // ═══════════════════════════════════════════════════════════════
  async function renderGame(id) {
    const app = document.getElementById('app');
    app.innerHTML = `<div style="display:flex;flex-direction:column;height:100vh;overflow:hidden;">
      ${renderHeader()}
      <div id="game-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div style="text-align:center;padding:40px;color:#555;">Loading game...</div>
      </div>
    </div>`;

  async function loadGame(id) {
    try {
      const r = await api('GET', `/api/games/${id}`);
      if (!r.ok) { navigate('#lobby'); return; }
      const d = await r.json();
      state.game = d.game;
      state.gameTheme = { slug: d.game.slug, country_name: d.game.country_name, accent_colour: d.game.accent_colour, footballer_name: d.game.footballer_name };
      state.credits = d.credits;
      state.walletBalance = d.wallet_balance;
      state.potBalance = d.captain_pot_balance;
      state.prevPotBalance = d.captain_pot_balance;
      state.squaresRevealed = d.squares_revealed;
      state.prizePot = d.prize_pot;

      // If game is completed, go back to lobby
      if (d.game.status === 'completed') { navigate('#lobby'); return; }

      renderGameBody();
      setupGamePolls(id);
      startKeepalive(id);
    } catch(e) {
      console.error('Game load error', e);
    }
  }

  function renderGameBody() {
    const game = state.game;
    const theme = state.gameTheme;
    const accentRgba = hexToRgba(theme.accent_colour, 0.55);
    const myTeam = state.themes.find(t => t.slug === (state.session ? state.session.my_team_slug : ''));
    const stageIdx = state.session ? state.session.stage_idx : game.stage_idx;
    const isMyGame = game.active_player_id === (state.session ? state.session.user_id : null);

    // Build portrait URL
    const portraitUrl = stageIdx >= 6
      ? '/images/trophy-reveal.jpg'
      : `/images/footballers/${theme.slug}.png`;

    const hud = `<div style="display:flex;gap:6px;padding:8px 12px;background:rgba(0,0,0,0.5);">
      <div class="hud-chip"><span style="font-size:0.68rem;color:#888;">Wallet</span><span class="val wallet-val">${Math.round(state.walletBalance)} t</span></div>
      <div class="hud-chip"><span style="font-size:0.68rem;color:#888;">Prize Pot</span><span class="val prize-val" style="color:#fbbf24;">${state.prizePot} t</span></div>
      ${potChipHtml(state.potBalance)}
      <div class="hud-chip"><span style="font-size:0.68rem;color:#888;">Shots</span><span class="val shots-val">${state.squaresRevealed}</span></div>
    </div>`;

    const myFlag = myTeam ? `<div class="flag-mini" style="background:${flagBg(myTeam.slug, myTeam.accent_colour)};background-size:cover;"></div>` : '';
    const oppFlag = `<div class="flag-mini" style="background:${flagBg(theme.slug, theme.accent_colour)};background-size:cover;"></div>`;
    const nationStrip = `<div class="nation-strip">
      ${myFlag}<span>${myTeam ? myTeam.country_name : 'You'}</span>
      <span style="color:#555;">vs</span>
      ${oppFlag}<span>${theme.country_name}</span>
      <span style="margin-left:auto;color:#666;font-size:0.8rem;">${stageName(stageIdx)}</span>

    // Build 64 cells
    const revealed = game.revealed || new Array(64).fill(false);
    let cells = '';
    for (let i = 0; i < 64; i++) {
      const isRevealed = revealed[i];
      cells += `<div class="cell${isRevealed ? ' revealed' : ''}" data-idx="${i}" style="${isRevealed ? '' : `background-color:${accentRgba};border-color:${hexToRgba(theme.accent_colour,0.85)};`}" onclick="onCellClick(${i})"></div>`;

      controls = `<div class="credits-chip">🎯 ${credRemaining} shot${credRemaining !== 1 ? 's' : ''} remaining</div>`;
    } else {
      controls = `<div style="display:flex;gap:10px;">
        <button class="bundle-btn btn-gold" style="flex:1;" onclick="buyBundle(8)">8 Shots — 36 tokens</button>
        <button class="bundle-btn btn-green" style="flex:1;" onclick="buyBundle(16)">16 Shots — 64 tokens</button>
      </div>
      <div style="text-align:center;margin-top:6px;">
        <span class="font-dm" style="font-size:0.82rem;color:#888;cursor:pointer;text-decoration:underline;" onclick="singleGuessMode()">or shoot once — 5 tokens</span>
      </div>`;
    }

    const initialHint = `${stageName(stageIdx)} — find the ball to knock out ${theme.country_name}`;

    document.getElementById('game-body').innerHTML = `
      ${hud}
      ${nationStrip}
      <div class="board-zone" id="board-zone" style="background-image:${boardBackdrop(theme.slug,theme.accent_colour)};">
        <div class="game-grid-wrapper">
          <div class="game-grid" id="game-grid" style="background-image:${bgWithFallback(portraitUrl,theme.accent_colour)};">
            ${cells}
          </div>
        </div>
      </div>
      <div style="padding:10px 12px;background:rgba(0,0,0,0.6);">
        <div id="controls-row" style="margin-bottom:8px;">${controls}</div>
        <div id="hint-bar" class="font-dm" style="text-align:center;font-size:0.8rem;color:#888;padding:4px 0;">${initialHint}</div>
        <div style="text-align:center;margin-top:6px;">
          <span class="font-dm" style="font-size:0.75rem;color:#555;cursor:pointer;text-decoration:underline;" onclick="leaveMap(${game.id})">Leave Map</span>
        </div>
      </div>`;
  }

  function updateHud() {
    const wv = document.querySelector('.wallet-val'); if (wv) wv.textContent = Math.round(state.walletBalance) + ' t';
    const pv = document.querySelector('.prize-val'); if (pv) pv.textContent = prizeDecay(state.squaresRevealed) + ' t';
    const sv = document.querySelector('.shots-val'); if (sv) sv.textContent = state.squaresRevealed;
  }

  function updateCreditsDisplay() {
    const row = document.getElementById('controls-row');
    if (!row) return;
    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    if (credRemaining > 0) {
      row.innerHTML = `<div class="credits-chip">🎯 ${credRemaining} shot${credRemaining !== 1 ? 's' : ''} remaining</div>`;
    } else {
      row.innerHTML = `<div style="display:flex;gap:10px;">
        <button class="bundle-btn btn-gold" style="flex:1;" onclick="buyBundle(8)">8 Shots — 36 tokens</button>
        <button class="bundle-btn btn-green" style="flex:1;" onclick="buyBundle(16)">16 Shots — 64 tokens</button>
      </div>
      <div style="text-align:center;margin-top:6px;">
        <span class="font-dm" style="font-size:0.82rem;color:#888;cursor:pointer;text-decoration:underline;" onclick="singleGuessMode()">or shoot once — 5 tokens</span>
      </div>`;
    }
  }

  let singleMode = false;
  window.singleGuessMode = function() { singleMode = true; showToast('Single guess mode: next click costs 5 tokens', 3000); };

  window.onCellClick = async function(idx) {
    const game = state.game;
    if (!game || game.status !== 'active') return;
    if ((game.revealed || [])[idx]) return;

    // Determine if using bundle or single
    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    const sessId = (credRemaining > 0 && state.credits) ? state.credits.id : null;

    if (!sessId && !singleMode) {
      // Need to purchase — prompt
      showToast('Buy shots above, or click "or shoot once — 5 tokens"', 3000);
      return;
    }
    singleMode = false;
    playBlip();

    const body = { square_index: idx };
    if (sessId) body.session_id = sessId;

    // Disable board during request
    document.querySelectorAll('.cell:not(.revealed)').forEach(c => c.style.pointerEvents = 'none');

    try {
      const r = await api('POST', `/api/games/${game.id}/guess`, body);
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        showToast(e.error || 'Guess failed');
        document.querySelectorAll('.cell').forEach(c => c.style.pointerEvents = '');
        return;
      }
      const d = await r.json();

      // Update state
      if (!game.revealed) game.revealed = new Array(64).fill(false);
      game.revealed[idx] = true;
      state.squaresRevealed = d.squares_revealed;
      state.walletBalance = d.wallet_balance;
      state.prizePot = prizeDecay(state.squaresRevealed);
      if (state.credits && sessId) {
        state.credits.credits_remaining = parseInt(state.credits.credits_remaining) - 1;
      }

      updatePotChips(d.pot_balance, null);
      updateHud();
      updateCreditsDisplay();

      const cell = document.querySelector(`.cell[data-idx="${idx}"]`);
      if (d.hit) {
        await runWinSequence(cell, idx, d);
      } else {
        // Miss — dissolve tile
        if (cell) {
          cell.classList.add('dissolving');
          setTimeout(() => { cell.classList.add('revealed'); cell.style.background = ''; cell.style.pointerEvents = 'none'; }, 600);
        }
        // Update hint bar
        const hint = document.getElementById('hint-bar');
        if (hint) hint.textContent = QUIPS[Math.floor(Math.random() * QUIPS.length)];
        document.querySelectorAll('.cell:not(.revealed)').forEach(c => c.style.pointerEvents = '');
      }
    } catch(e) {
      console.error('Guess error', e);
      document.querySelectorAll('.cell').forEach(c => c.style.pointerEvents = '');
    }
  };

  // ═══════════════════════════════════════════════════════════════
  // WIN SEQUENCE
  // ═══════════════════════════════════════════════════════════════
  async function runWinSequence(hitCell, idx, result) {
    clearPolls();
    playVictoryJingle();
    const isFinal = (state.session && state.session.stage_idx >= 6) || result.interstitial === 'final_win';
    const theme = state.gameTheme;
    const stageIdx = state.session ? state.session.stage_idx : state.game.stage_idx;

    // Step 1: shake hit tile
    if (hitCell) hitCell.classList.add('shake');
    await sleep(800);

    // Step 2: dim and blur board
    const boardZone = document.getElementById('board-zone');
    const dim = document.createElement('div');
    dim.className = 'board-dim';
    boardZone && boardZone.appendChild(dim);

    // Step 3: float object icon to centre
    const icon = isFinal ? '🏆' : '⚽';
    const objEl = document.createElement('div');
    objEl.style.cssText = `position:fixed;font-size:80px;z-index:200;pointer-events:none;transition:all 0.6s cubic-bezier(.22,1,.36,1);`;
    if (hitCell) {
      const rect = hitCell.getBoundingClientRect();
      objEl.style.left = (rect.left + rect.width/2 - 40) + 'px';
      objEl.style.top = (rect.top + rect.height/2 - 40) + 'px';
    } else {
      objEl.style.left = '50%'; objEl.style.top = '50%';
    }
    objEl.textContent = icon;
    document.body.appendChild(objEl);
    await sleep(50);
    objEl.style.left = '50%';
    objEl.style.top = '40%';
    objEl.style.transform = 'translate(-50%, -50%) scale(1.5)';
    objEl.style.filter = 'drop-shadow(0 0 20px gold)';
    await sleep(700);

    // Step 4: cascade dissolve remaining tiles
    const unrevealed = document.querySelectorAll('.cell:not(.revealed)');
    unrevealed.forEach((c, i) => {
      const delay = Math.random() * 1300;
      setTimeout(() => {
        c.classList.add('dissolving');
        setTimeout(() => { c.classList.add('revealed'); c.style.background = ''; }, 600);
      }, delay);
    });

    // Step 5: start confetti, hold for 5s
    await sleep(500);
    startConfetti();
    const holdStart = Date.now();

    // Step 6: name tag at ~2s into hold
    await sleep(2000);
    const nameTag = document.createElement('div');
    nameTag.style.cssText = `position:absolute;bottom:16px;left:0;right:0;text-align:center;z-index:60;animation:toast-in 0.5s ease;`;
    const footballerText = isFinal ? 'World Cup Trophy 🏆' : `${theme.footballer_name} — ${theme.country_name}`;
    nameTag.innerHTML = `<span style="font-family:'DM Sans',sans-serif;font-size:0.9rem;background:rgba(0,0,0,0.8);padding:6px 14px;border-radius:20px;color:white;">${footballerText}</span>`;
    boardZone && boardZone.appendChild(nameTag);

    // Reveal banner
    let banner = 'GOAL!';
    if (result.jackpot_paid > 0) banner = 'HOLE IN ONE!';
    else if (isFinal) banner = 'WORLD CHAMPIONS!';
    else if (stageIdx >= 3) banner = 'World Cup!';
    const bannerEl = document.createElement('div');
    bannerEl.style.cssText = `position:absolute;top:20px;left:0;right:0;text-align:center;z-index:60;animation:toast-in 0.5s ease;`;
    bannerEl.innerHTML = `<span style="font-family:'DM Sans',sans-serif;font-size:2rem;font-weight:900;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,0.7);">${banner}</span>`;
    boardZone && boardZone.appendChild(bannerEl);

    // Wait out the hold (total 5s from cascade start ≈ 3s left)
    const elapsed = Date.now() - holdStart;
    await sleep(Math.max(0, 5000 - elapsed + 500));

    // Remove floating icon
    objEl.remove();

    // Step 7: result card
    let resultTitle = 'You found the net!';
    if (result.jackpot_paid > 0) resultTitle = "Captain's Jackpot!";
    else if (isFinal) resultTitle = 'Champions of the World!';
    else if (stageIdx >= 3) resultTitle = `${theme.country_name} knocked out!`;

    const resultCard = document.createElement('div');
    resultCard.style.cssText = `position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);`;
    resultCard.innerHTML = `
      <div class="result-card">
        <div style="font-size:2rem;margin-bottom:8px;">${icon}</div>
        <div style="font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;">${resultTitle}</div>
        ${result.jackpot_paid > 0 && !isFinal ? `<div style="font-size:0.85rem;color:#aaa;margin-bottom:4px;">${stageIdx >= 3 ? theme.country_name + ' knocked out!' : 'You found the net!'}</div>` : ''}
        <div style="font-family:'Space Mono',monospace;color:#fbbf24;font-size:1.1rem;margin:12px 0;">+${result.prize_paid} tokens</div>
        ${result.jackpot_paid > 0 ? `<div style="font-family:'Space Mono',monospace;color:#fff;font-size:0.9rem;margin-bottom:4px;">⚡ Captain's Pot: +${Math.round(result.jackpot_paid)} tokens</div>` : ''}
        ${result.credits_refunded > 0 ? `<div style="font-size:0.8rem;color:#888;margin-bottom:8px;">Bundle refund: +${result.credits_refunded.toFixed(1)} t</div>` : ''}
        <button class="bundle-btn btn-gold" style="width:100%;margin-top:12px;" onclick="handleInterstitial('${result.interstitial}', ${JSON.stringify(result).replace(/"/g,'&quot;')})">Continue →</button>
      </div>`;
    document.body.appendChild(resultCard);

    // Update session state
    if (result.new_stage_idx !== null) {
      if (state.session) state.session.stage_idx = result.new_stage_idx;
    }
  }

    try {
      const r = await api('GET', '/api/league');
      if (!r.ok) { document.getElementById('league-body').innerHTML = '<p style="color:#f87171;text-align:center;padding:40px;">Error loading league</p>'; return; }
      const d = await r.json();
      renderLeagueBody(d);
      setupLeaguePolls(d);

  function renderLeagueBody(d) {
    const body = document.getElementById('league-body');
    if (!body) return;
    const now = new Date();
    const deadline = new Date('2026-07-19T00:00:00Z');
    const diff = deadline - now;
    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const countdown = diff > 0 ? `${days}d ${hrs}h ${mins}m` : 'Tournament ended';

    const prizeAmt = d.league_prize_tokens || 0;
    const myUserId = null; // can't get from league endpoint without auth

    let rows = d.rankings.map((r, i) => `
      <tr class="${d.current_player && d.current_player.user_id == r.user_id ? 'my-row' : ''}">
        <td class="league-rank">#${i+1}</td>
        <td class="league-name">${r.display_name || r.username}</td>
        <td class="league-score">${Math.round(r.total_tokens_won).toLocaleString()} t</td>
      </tr>`).join('');

    let myRow = '';
    if (d.current_player && d.current_player.rank > 20) {
      myRow = `<tr><td colspan="3" style="padding:4px;border-top:1px solid rgba(255,255,255,0.1);"></td></tr>
        <tr class="my-row"><td class="league-rank">#${d.current_player.rank}</td>
          <td class="league-name">${d.current_player.display_name || d.current_player.username} (you)</td>
          <td class="league-score">${Math.round(d.current_player.total_tokens_won).toLocaleString()} t</td></tr>`;
    }

    body.innerHTML = `
      <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:16px;margin-bottom:20px;font-family:'DM Sans',sans-serif;">
        <div style="font-size:0.8rem;color:#888;margin-bottom:4px;">League Prize</div>
        <div style="font-size:1rem;line-height:1.5;color:#f0f0f5;">The player leading the League when the World Cup Final whistle blows on <strong>19 July 2026</strong> wins <strong style="color:#fbbf24;font-family:'Space Mono',monospace;">${prizeAmt.toLocaleString()} tokens</strong> — 2% of all tokens ever collected by the game.</div>
        <div style="font-family:'Space Mono',monospace;font-size:0.8rem;color:#888;margin-top:8px;">⏱ ${countdown} remaining</div>
      </div>
      <div style="font-family:'DM Sans',sans-serif;font-weight:700;margin-bottom:12px;">Top 20</div>
      <table class="league-table">
        <thead><tr><th style="text-align:left;">Rank</th><th style="text-align:left;">Player</th><th style="text-align:right;">Score</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" style="text-align:center;color:#555;padding:20px;">No scores yet</td></tr>'}${myRow}</tbody>
      </table>`;
  }

  function setupLeaguePolls(initialData) {
    let lastLeader = initialData.current_leader ? initialData.current_leader.user_id : null;
    state.polls.push(setInterval(async () => {
      try {
        const r = await api('GET', '/api/league');
        if (!r.ok) return;
        const d = await r.json();
        const newLeader = d.current_leader;
        if (newLeader && newLeader.user_id !== lastLeader) {
          showToast(`🏆 ${newLeader.display_name || newLeader.username} is now leading the League!`);
          lastLeader = newLeader.user_id;
        }
        renderLeagueBody(d);
      } catch {}
    }, 3500));
  }

  async function pollLeagueForToast() {
    try {
      const r = await api('GET', '/api/league');
      if (!r.ok) return;
      const d = await r.json();
      if (!state.leaderState) { state.leaderState = d.current_leader ? d.current_leader.user_id : null; return; }
      const newLeader = d.current_leader;
      if (newLeader && newLeader.user_id !== state.leaderState) {
        showToast(`🏆 ${newLeader.display_name || newLeader.username} is now leading the League!`);
        state.leaderState = newLeader.user_id;
      }
    } catch {}
  }

          <p><strong>Captain's Pot long-run net:</strong></p>
          <ul>
            <li>Jackpot probability per fresh board: 1/64 ≈ 1.56%</li>
            <li>Over 64 boards: pot accumulates ≈ 64 × 32.5 = 2,080 + 100 seed = ~2,180 tokens per jackpot event</li>
            <li>House re-seeds 100 tokens per jackpot win; amortised cost ≈ 1.56 tokens/board</li>
            <li>Adjusted house margin: (22 − 1.56) / 162.5 ≈ <strong>12.6% net</strong> — within 10–15% target ✓</li>
          </ul>
        </div>
      </div>
    </div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════
  async function init() {
    // Load themes globally for use across screens
    try {
      const r = await api('GET', '/api/themes');
      if (r.ok) { const d = await r.json(); state.themes = d.themes || []; }
    } catch {}

    // On load: check session then route
    try {
      const r = await api('GET', '/api/session');
      if (r.ok) {
        const d = await r.json();
        state.session = d.session;
        state.walletBalance = d.wallet_balance || 1000;
        state.potBalance = d.captain_pot_balance || 100;
        state.prevPotBalance = state.potBalance;
        state.potLastWonAt = null;

        // If active game in session, go straight there
        if (d.session && d.session.current_game_id && !d.session.session_complete) {
          navigate('#game/' + d.session.current_game_id);
          return;
        }
      }
    } catch {}

    route();
  }

  init();
  </script>
