          <p>Both conditions must be true. Joining an existing map (which has prior guesses) makes the jackpot impossible on that board. Missing your first guess on a fresh map also makes it impossible for the rest of that board.</p>
          <p>Because a blind first shot is far easier on a small group board (1 in 16) than in the Final (1 in 49), the pot is <strong>anchored low during the easy group stage and topped up as play reaches harder stages</strong>. Floors: group <strong>100</strong>, knockout <strong>160</strong>, semi <strong>230</strong>, final <strong>320</strong>. Each top-up (+60 into the knockouts, +70 into the semi, +90 into the final) is announced on-screen — the longer the odds, the bigger the top-up.</p>
          <p>You'll see a pop-up with the top-up amount <strong>before you start</strong> the first round of each new tier, so you know how big the jackpot has grown going in. New to the game? Tap <strong>ⓘ How it works</strong> on the home screen for a quick recap any time.</p>
          <p>On a jackpot win: you receive the standard Prize Pot plus the entire Captain's Pot balance. The pot then reseeds to the floor of the stage where it was won, so an easy early win never leaves an inflated pot behind.</p>
        </div>

        <div class="faq-section">
          <h2>The League</h2>
          <p>The League tracks total tokens won across all tournaments, forever. Every prize, jackpot, and house bonus you earn adds to your League score.</p>
          <p>The player leading the League when the World Cup Final whistle blows on <strong>19 July 2026</strong> wins <strong>2% of all tokens ever collected by the game</strong>. The live prize amount is shown at the top of the League page and updates in real time as players spend tokens.</p>
          <p>You set your League display name from the Victory Stadium screen after winning all 7 stages. The League page shows the Top 20 and your own rank, updated every few seconds.</p>
          <p><strong>Real-time updates:</strong> The League leaderboard refreshes automatically every few seconds — you'll see scores climb as other players earn tokens. The countdown timer to the deadline and the live prize pool amount update in real time too, so you can watch the competition unfold. You'll also see a toast notification whenever a new player takes the lead.</p>
        </div>

        <div class="faq-section">
          <h2>The Victory Stadium</h2>
          <p>After winning all 7 matches and lifting the World Cup, you're taken to the <strong>Victory Stadium</strong> — a celebration screen showing your champion status.</p>
          <p>On this screen you'll see:</p>
          <ul>
            <li><strong>Your champion nation</strong> — the country you led to victory</li>
            <li><strong>Total tokens won</strong> — your earnings from all 7 stages combined</li>
            <li><strong>House Bonus:</strong> +50 tokens (automatic reward for completing the tournament)</li>
            <li><strong>Captain's Jackpot wins</strong> — if you hit the jackpot during your run, that amount is shown separately</li>
            <li><strong>Your League rank and score</strong> — where you stand against all other players</li>
          </ul>
          <p>You can <strong>set or update your League display name</strong> via a text input — this is how you appear on the leaderboard. It's optional, but recommended if you want to claim your spot in the rankings.</p>
          <p>Two buttons appear at the bottom:</p>
          <ul>
            <li><strong>🏆 Leaderboard</strong> — jump to the live League page to see where you rank and watch the competition</li>
            <li><strong>▶ Play Again</strong> — start a fresh tournament (you'll pick a new nation and reset, but your wallet and League score are preserved)</li>
          </ul>
        </div>

        <div class="faq-section">
          <h2>Sounds & Settings</h2>
          <p>GOAL! features a retro 8-bit sound design that enhances the World Cup atmosphere. Use the <strong>mute button (🔊/🔇)</strong> in the top-right header to toggle sound on and off. Your mute preference is saved in your browser, so it persists across sessions.</p>
          <p>Three types of sounds play during your tournament:</p>
          <ul>
            <li><strong>Tile click blips</strong> — a quick NES-style beep every time you tap a tile</li>
            <li><strong>Victory jingle</strong> — a triumphant fanfare plays when you find the ball and win a match</li>
            <li><strong>Goal anthem</strong> — an epic 32-bar orchestral victory tune plays when you win all 7 stages and lift the World Cup in the Final</li>
          </ul>
          <p>The audio system uses the Web Audio API with synthesized square and triangle waves — no audio files are needed, so sounds load instantly. If you prefer silent play, just tap the mute button and all sound effects will be disabled.</p>
        </div>

        <div class="faq-hackathon">
          <div class="faq-hackathon-badge">🔬 Dev / Hackathon Info — not shown in production</div>
          <h2>Tech &amp; Profitability</h2>

          <h3>Prize Curve</h3>
          <p>The prize is now keyed to the <em>fraction</em> of the board revealed, so it scales identically across every grid size:</p>
          <pre>prize(n, N) = max(8, floor(150 / (1 + e^(10.8 × (n/N − 0.4444)))))</pre>
          <p>where <em>n</em> is the tiles revealed before the winning guess and <em>N</em> is the board size. At N=36 this is exactly the original 0.30×(n−16) curve. Expected prize per board stays ≈ 68–73 tokens at any grid size.</p>
          <p><strong>Key values (fraction of board revealed):</strong></p>
          <table style="border-collapse:collapse;width:100%;font-size:0.8rem;margin-bottom:12px;">
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);"><th style="text-align:left;padding:4px 8px;color:#888;">% revealed</th><th style="text-align:right;padding:4px 8px;color:#888;">Prize (tokens)</th></tr>
            ${[['0%',148],['15%',142],['30%',124],['44%',75],['50%',53],['60%',23],['70%',10],['≥73%',8]].map(([n,p]) => `<tr><td style="padding:4px 8px;color:#ccc;">${n}</td><td style="text-align:right;padding:4px 8px;color:#fbbf24;font-family:'Space Mono',monospace;">${p}</td></tr>`).join('')}
          </table>

          <h3>Per-Stage Pricing &amp; Margin (~12.5%)</h3>
          <p>Price per shot is set per stage so the house keeps ~12.5% (10–15% band) regardless of board size. With the ball uniform on an N-tile board, expected shots = (N+1)/2, and net margin = (revenue − 20% pot − expected prize) / revenue.</p>
          <table style="border-collapse:collapse;width:100%;font-size:0.78rem;margin-bottom:12px;">
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);"><th style="text-align:left;padding:4px 6px;color:#888;">Stage</th><th style="text-align:right;padding:4px 6px;color:#888;">Tiles</th><th style="text-align:right;padding:4px 6px;color:#888;">t/shot</th><th style="text-align:right;padding:4px 6px;color:#888;">Margin</th></tr>
            ${[['Group',16,13,'~14%'],['Knockout',25,8,'~13%'],['Semi',36,5.5,'~13%'],['Final',49,4,'~12%']].map(([s,n,p,m]) => `<tr><td style="padding:4px 6px;color:#ccc;">${s}</td><td style="text-align:right;padding:4px 6px;color:#ccc;">${n}</td><td style="text-align:right;padding:4px 6px;color:#fbbf24;font-family:'Space Mono',monospace;">${p}</td><td style="text-align:right;padding:4px 6px;color:#93c5fd;">${m}</td></tr>`).join('')}
          </table>
          <p>Bundles prepay 8 or 16 shots at the same stage rate (no per-shot discount), so every purchase option holds the same ~12.5% margin.</p>

          <h3>Captain's Pot — Odds-Indexed Floors</h3>
          <p>The pot reseeds to a stage floor F = K·N (K = 6.25): group 100, knockout 160, semi 230, final 320 (rounded up to tidy figures). Expected house jackpot cost per fresh board is F/N ≈ 6.25–6.5 tokens — <strong>roughly constant across every stage</strong>, which is what keeps the long-run margin steady.</p>
          <ul>
            <li>Top-ups derived from the change in odds: +60 entering knockouts, +70 entering the semi, +90 entering the final.</li>
            <li>Jackpot odds per fresh board: group 1/16, knockout 1/25, semi 1/36, final 1/49.</li>
            <li>Reseed on win uses the floor of the winning stage; the pot's anchor tier resets so it can climb again.</li>
          </ul>

          <h3>🔐 ZK Enhancement (Future)</h3>
          <p>Currently players must trust that the hidden object is placed before the game starts and never moved. A Zero-Knowledge proof layer could make this <strong>verifiably fair</strong> without revealing the answer:</p>
          <ul>
            <li>At game creation, the server commits to the ball position using a hash: <code>commit = hash(position, salt)</code>. The commitment is stored publicly (on-chain or in the game record).</li>
            <li>At game end, the server reveals position + salt. Anyone can verify <code>hash(position, salt) == commit</code>, proving the position was fixed from the start.</li>
            <li>A ZK proof goes further: the server can prove it knows a valid pre-image for the commitment <em>without</em> revealing the position mid-game — so the proof is verifiable in real time, not just after the fact.</li>
            <li><strong>Noir</strong> (by Aztec) is a Rust-like language for writing ZK circuits that compile to both native provers and browser-runnable WASM. It would be the natural fit here: write the "ball is at position P under commitment C" circuit in Noir, generate a proof server-side per game, verify client-side in the browser before the player makes their first guess.</li>
          </ul>
          <p>This upgrade would turn the game's fairness from a trust assumption into a cryptographic guarantee — relevant for any real-money deployment.</p>
        </div>
      </div>
    </div>`;
  }

  window.switchToTestingMode = function() {
    testingModeActive = true;
    state.testingMode = true;
    localStorage.setItem('testingMode', 'true');
    showToast('🧪 Testing Mode enabled - 1000 credit fake wallets');
    renderFaq();
    renderLobby();
  };

  window.switchToRealMode = function() {
    testingModeActive = false;
    state.testingMode = false;
    localStorage.removeItem('testingMode');
    showToast('💰 Real Token Mode enabled');
    renderFaq();
    renderLobby();
  };

  // ═══════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════
  async function init() {
    // Initialize testing mode from localStorage, default to true (demo/testing mode)
    testingModeActive = localStorage.getItem('testingMode') !== 'false';

    // Initialize i18n system
    try {
      await window.initI18n();
    } catch (err) {
      console.error('i18n init failed:', err);
    }

    // Load themes globally for use across screens
    try {
      const r = await api('GET', '/api/themes');
      if (r.ok) { const d = await r.json(); state.themes = d.themes || []; }
    } catch {}

    // On load: check session then route
    try {
      const r = await api('GET', '/api/session');
      if (r.ok) {
        const d = await r.json();
        state.session = d.session;
        state.walletBalance = d.wallet_balance || 1000;
        state.potBalance = d.captain_pot_balance || 100;
        state.prevPotBalance = state.potBalance;
        // Seed from the server's most recent win so a fresh page load doesn't
        // fire a phantom "just won" broadcast on the first poll.
        state.potLastWonAt = d.last_won_at || null;

        // If active game in session, go straight there
        if (d.session && d.session.current_game_id && !d.session.session_complete) {
          navigate('#game/' + d.session.current_game_id);
          return;
        }
      }
    } catch {}

    route();

  }

  init();
  </script>
