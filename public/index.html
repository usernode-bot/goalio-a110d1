  <title>GOAL! World Cup Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1/dist/confetti.browser.min.js"></script>
  <script src="/i18n.js"></script>

  <style>
    :root {
      --glass-line: rgba(150,160,255,.24);
      --accent: #6d7bff;
      --accent-soft: rgba(109,123,255,0.33);
      --gold: #ffce4a;
    }
    * { box-sizing: border-box; }
    html { background: #0a0a0f; }
    body { font-family: 'Space Grotesk', sans-serif; background: transparent; color: #f0f0f5; margin: 0; min-height: 100vh; }

    /* Full-screen flag background (game board only — set via JS) */
    .bg {
      position: fixed; inset: 0; z-index: -2;
      background-size: cover; background-position: center; background-repeat: no-repeat;
      --overlay-opacity: 1;
    }
    .bg::after {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(8,9,20,0.0) 0%, rgba(8,9,20,0.35) 100%),
        linear-gradient(180deg, rgba(7,7,16,0.22) 0%, rgba(7,7,16,0.05) 50%, rgba(7,7,16,0.28) 100%);
      opacity: var(--overlay-opacity);
      transition: opacity 0.45s;
    }
    .font-dm { font-family: 'DM Sans', sans-serif; }
    .font-mono-stat { font-family: 'Space Mono', monospace; }
    .font-8bit { font-family: 'Press Start 2P', monospace; }

    /* Lobby hero */
    .hero-title { font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: clamp(2.4rem, 10vw, 3.6rem); letter-spacing: -1.5px; line-height: 1; margin: 0; }
    .hero-go { color: #f0f0f5; }
    .hero-al { color: #e23b4e; }
    .hero-edition { display: block; font-family: 'Space Mono', monospace; font-weight: 700; font-size: clamp(0.7rem, 3vw, 1rem); letter-spacing: 0.22em; color: #fbbf24; text-transform: uppercase; margin-top: 5px; }
    .hero-sub { font-family: 'Space Grotesk', sans-serif; color: #9ca3af; font-size: 0.75rem; margin-top: 4px; margin-bottom: 8px; }

    /* Nation flag card */
    .nation-card {
      border-radius: 12px; overflow: hidden; cursor: pointer; position: relative;
      border: 2px solid rgba(255,255,255,0.08);
      transition: transform 0.18s cubic-bezier(.22,1,.36,1), box-shadow 0.18s, border-color 0.18s;
      aspect-ratio: 3/2; background: #11131c;
    }
    .nation-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 0 0 2px #fbbf24, 0 12px 32px rgba(251,191,36,0.35); border-color: #fbbf24; }
    .nation-card:active { transform: translateY(-2px) scale(0.99); }
    .nation-card .flag-area { position: absolute; inset: 0; overflow: hidden; }
    .nation-card .flag-area img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .nation-card .flag-area::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,0) 45%, rgba(0,0,0,0.78) 100%); z-index: 1; }
    .nation-card .name-area { position: absolute; left: 0; right: 0; bottom: 0; padding: 6px 4px; text-align: center; color: #fff; font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: clamp(8px, 2.2vw, 10px) !important; line-height: 1.2; text-shadow: 0 1px 4px rgba(0,0,0,0.9); z-index: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* HUD chips */
    .hud-chip {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 6px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem; color: #aaa; text-align: center; flex: 1;
    }
    .hud-chip .val { font-family: 'Space Mono', monospace; font-size: 1rem; color: #f0f0f5; font-weight: 700; display: block; }
    .pot-chip {
      border-color: rgba(251,191,36,0.5) !important;
      box-shadow: 0 0 8px rgba(251,191,36,0.2);
    }
    .pot-chip .val { font-size: 1rem !important; color: #fbbf24 !important; }

    @keyframes pot-heartbeat {
      0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,0.2); }
      50% { box-shadow: 0 0 20px rgba(251,191,36,0.6), 0 0 40px rgba(251,191,36,0.2); }
    }
    .pot-heartbeat { animation: pot-heartbeat 3s ease-in-out infinite; }

    @keyframes pot-pulse-ring {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* Game board — board dominates, all 64 tiles always visible, no scroll */
    .board-zone {
      flex: 1 1 auto; min-height: auto; position: relative;
      display: flex; align-items: center; justify-content: center; padding: 12px 2px 12px 2px;
    }

    /* Three-layer board stack — mobile-first: near-full width */
    .board-wrap {
      position: relative;
      border-radius: 14px;
      overflow: visible;
      aspect-ratio: 3/4;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 0 0 3px rgba(0,0,0,0.6),
        0 20px 60px -10px rgba(0,0,0,0.95),
        inset 0 1px 0 rgba(255,255,255,0.06);
      width: min(96vw, calc(100vh - 185px));
      width: min(96vw, calc((100svh - 140px) * 3/4));
      max-height: none;
    }
    @media (min-width: 481px) {
      .board-wrap { width: min(400px, calc(100vh - 185px)); width: min(400px, calc((100svh - 140px) * 3/4)); }
      #game-body { max-width: 440px; margin: 0 auto; }
    }
    /* Full-height game container using small viewport height to stay within visible area on mobile */
    .game-screen { display: flex; flex-direction: column; height: 100vh; height: 100svh; overflow: hidden; position: relative; }
    .portrait {
      position: absolute; inset: 0; z-index: 0;
      background-size: cover; background-position: center top;
    }
    .board {
      position: absolute; inset: 0; z-index: 2;
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 2px; padding: 2px;
      perspective: 1000px;
    }
    .reveal {
      position: absolute; inset: 0; z-index: 6;
      display: none; pointer-events: none;
    }

    /* Gem tiles */
    .tile {
      position: relative;
      cursor: pointer;
      aspect-ratio: 3/4;
      background: linear-gradient(150deg, #2b3068, #13152f);
      box-shadow:
        inset 0 0 0 1px rgba(150,160,255,.18),
        inset 0 1px 0 rgba(255,255,255,.10);
      transition: filter .15s, transform .1s;
      overflow: hidden;
    }
    .tile::before {
      content: "";
      position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,.16) 50%, transparent 60%);
      pointer-events: none;
    }
    .tile::after {
      content: "";
      position: absolute; inset: 0;
      box-shadow: inset 0 0 0 2px var(--accent-soft), inset 0 0 20px -2px var(--accent-soft);
      opacity: 0;
      transition: .16s;
      pointer-events: none;
    }
    .tile:not(.open):hover { filter: brightness(1.3) saturate(1.4); z-index: 3; }
    .tile:not(.open):hover::after { opacity: 1; }
    .tile:not(.open):active { transform: scale(.94); }
    .tile.open { cursor: default; background: transparent; box-shadow: none; pointer-events: none; }
    .tile.open::before { opacity: 0; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(6px); }
      45% { transform: translateX(-5px); }
      60% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      90% { transform: translateX(3px); }
    }
    .shake { animation: shake 0.8s ease-in-out; }

    /* Dramatic 3D-flip tile reveal for cascade/win */
    @keyframes tile-flip {
      0%   { transform: perspective(500px) rotateY(0deg) scale(1); filter: brightness(1); opacity: 1; }
      7%   { filter: brightness(3) saturate(2); transform: perspective(500px) rotateY(-8deg) scale(1.05); }
      28%  { transform: perspective(500px) rotateY(42deg); filter: brightness(1.3); opacity: 0.9; }
      68%  { transform: perspective(500px) rotateY(82deg); opacity: 0.3; filter: brightness(0.3); }
      100% { transform: perspective(500px) rotateY(90deg) scaleX(0.01); opacity: 0; }
    }
    .dissolving { animation: tile-flip 0.42s cubic-bezier(.4,0,.2,1) forwards; }
    /* Miss guess: screen-shake + dramatic flip */
    @keyframes tile-flip-miss {
      0%   { transform: perspective(500px) rotateY(0deg) translateX(0) scale(1); filter: brightness(1); opacity: 1; }
      5%   { filter: brightness(2.8) saturate(2); transform: perspective(500px) translateX(-7px) scale(1.04); }
      10%  { transform: perspective(500px) translateX(7px); filter: brightness(2); }
      16%  { transform: perspective(500px) translateX(-5px); }
      22%  { transform: perspective(500px) translateX(4px); }
      28%  { transform: perspective(500px) translateX(0) rotateY(0deg); filter: brightness(1.1); }
      55%  { transform: perspective(500px) rotateY(58deg); opacity: 0.6; filter: brightness(0.6); }
      100% { transform: perspective(500px) rotateY(90deg) scaleX(0.01); opacity: 0; }
    }
    .flip-miss { animation: tile-flip-miss 0.62s cubic-bezier(.4,0,.6,1) forwards; }

    /* Win sequence animations */
    @keyframes fadeout { 0% { opacity: 1; } 100% { opacity: 0; } }
    @keyframes blackfade { 0% { opacity: 0; } 100% { opacity: 0.9; } }

    /* Match-start square spawn animation */
    @keyframes tile-spawn {
      0% { opacity: 0; transform: scale(0.8); filter: drop-shadow(0 0 8px gold); }
      60% { opacity: 1; transform: scale(1.05); filter: drop-shadow(0 0 12px gold); }
      100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 0px gold); }
    }
    .tile-spawn { animation: tile-spawn 0.2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Full-board sparkle flash when all tiles finish spawning */
    @keyframes tile-sparkle-flash {
      0% { filter: drop-shadow(0 0 0px gold); transform: scale(1); }
      50% { filter: drop-shadow(0 0 20px gold); transform: scale(1.08); }
      100% { filter: drop-shadow(0 0 0px gold); transform: scale(1); }
    }
    .tile-sparkle-flash { animation: tile-sparkle-flash 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Reveal animation variants */
    @keyframes reveal-zoom-burst {
      0% { transform: perspective(600px) scale(0.8) rotateZ(0deg); opacity: 1; filter: brightness(1); }
      40% { filter: brightness(2.5) saturate(1.5); }
      60% { transform: perspective(600px) scale(1.3) rotateZ(8deg); opacity: 0.5; }
      100% { transform: perspective(600px) scale(2) rotateZ(15deg); opacity: 0; }
    }
    .reveal-zoom-burst { animation: reveal-zoom-burst 0.62s cubic-bezier(.4,0,.2,1) forwards; }

    @keyframes reveal-slide {
      0% { transform: translateX(0) scaleY(1); opacity: 1; filter: brightness(1); }
      20% { filter: brightness(2.2) saturate(1.8); }
      50% { transform: translateX(40px) scaleY(0.95) rotateZ(-5deg); opacity: 0.4; }
      100% { transform: translateX(80px) scaleY(0.1) rotateZ(-15deg); opacity: 0; }
    }
    .reveal-slide { animation: reveal-slide 0.62s cubic-bezier(.4,0,.6,1) forwards; }

    .reveal-fast { animation-duration: 0.31s !important; }

    /* Tile exit animation for goal celebration */
    @keyframes tile-exit-spin-fade {
      0% { transform: scale(1) rotateZ(0deg); opacity: 1; filter: drop-shadow(0 0 8px gold); }
      50% { transform: scale(1.1) rotateZ(180deg); opacity: 0.7; filter: drop-shadow(0 0 20px gold); }
      100% { transform: scale(0) rotateZ(360deg); opacity: 0; filter: drop-shadow(0 0 0px gold); }
    }
    .tile-exit { animation: tile-exit-spin-fade 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

    /* Ensure reveal animations only apply within game board */
    #lobby-body .reveal-zoom-burst, #lobby-body .reveal-slide,
    #victory-bg .reveal-zoom-burst, #victory-bg .reveal-slide { animation: none !important; transform: none !important; }

    /* Football goal spin animation */
    @keyframes goal-spin {
      0% { transform: rotateZ(0deg); }
      100% { transform: rotateZ(var(--spin-amount)); }
    }
    .goal-spin { animation: goal-spin var(--spin-duration, 2s) linear forwards; }

    /* 80s GOAL text animations */
    @keyframes goal-neon-flicker {
      0% { color: #ff006e; text-shadow: 0 0 10px #ff006e, 0 0 20px #ff006e; }
      20% { color: #00f5ff; text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff; }
      40% { color: #ffbe0b; text-shadow: 0 0 10px #ffbe0b, 0 0 20px #ffbe0b; }
      60% { color: #ff006e; text-shadow: 0 0 10px #ff006e, 0 0 20px #ff006e; }
      80% { color: #00f5ff; text-shadow: 0 0 10px #00f5ff, 0 0 20px #00f5ff; }
      100% { color: #ffbe0b; text-shadow: 0 0 10px #ffbe0b, 0 0 20px #ffbe0b; }
    }
    .goal-neon-flicker { animation: goal-neon-flicker 1.2s ease-in-out forwards; }

    @keyframes goal-marquee {
      0% { transform: translateX(-100%); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(100%); opacity: 0; }
    }
    .goal-marquee { animation: goal-marquee 2.5s linear forwards; overflow: hidden; white-space: nowrap; }

    @keyframes goal-stack-pulse {
      0% { transform: scale(0.8); opacity: 0; filter: blur(2px); }
      30% { transform: scale(1.1); opacity: 1; filter: blur(0); }
      60% { transform: scale(1); opacity: 1; }
      85% { transform: scale(0.95); opacity: 0.8; }
      100% { transform: scale(0.9); opacity: 0; }
    }
    .goal-stack-pulse { animation: goal-stack-pulse 2s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }

    /* Game HUD — ultra compact 4-chip row (scoped to game screen) */
    .game-hud { display: flex; gap: 4px; padding: 2px 8px; background: rgba(0,0,0,0.48); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; }
    .game-hud .hud-chip { padding: 2px 5px !important; border-radius: 6px !important; font-size: 7.5px !important; line-height: 1.1; }
    .game-hud .hud-chip .val { font-size: 12px !important; }
    .game-hud .pot-chip { box-shadow: 0 0 8px rgba(251,191,36,0.18) !important; }
    .game-hud .pot-chip .val { font-size: 12px !important; color: #fbbf24 !important; }

    /* Nation strip — single tight row */
    .nation-strip { font-family: 'DM Sans', sans-serif; font-size: 0.68rem; color: #bbb; display: flex; align-items: center; gap: 5px; padding: 1px 8px; background: rgba(0,0,0,0.38); border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0; min-height: 22px; }
    .flag-mini { width: 18px; height: 12px; border-radius: 2px; display: inline-block; flex-shrink: 0; object-fit: cover; vertical-align: middle; }

    /* Game footer — compact controls + hint */
    .game-footer { flex-shrink: 0; padding: 2px 8px 3px; background: rgba(0,0,0,0.55); border-top: 1px solid rgba(255,255,255,0.08); }
    .game-footer .bundle-btn { padding: 0 10px !important; font-size: 0.78rem !important; height: 34px; line-height: 34px; border-radius: 10px !important; }
    .game-footer .credits-chip { padding: 4px 10px !important; font-size: 0.78rem !important; border-radius: 10px !important; }

    /* Mobile: squeeze header, HUD, and nation strip to save height */
    @media (max-width: 480px) {
      header { padding: 4px 12px !important; }
      .game-hud { padding: 1px 6px; }
      .game-hud .hud-chip { padding: 1px 4px !important; font-size: 6.5px !important; }
      .game-hud .hud-chip .val { font-size: 11px !important; }
      .nation-strip { padding: 0px 6px; min-height: 20px; font-size: 0.62rem; gap: 4px; }
      /* Lobby stat boxes on mobile */
      .lobby-stats-row { gap: 6px !important; }
      .lobby-stat-box { padding: 3px 6px !important; min-width: 0; }
      .lobby-stat-box > span:first-child { font-size: 0.6rem !important; }
      .lobby-stat-box .val { font-size: 0.85rem !important; }
      /* Victory stadium on mobile */
      #victory-bg { padding: 16px 12px !important; }
      .result-card { max-width: 100% !important; margin: 0 auto; }
      #display-name-input { font-size: 0.82rem !important; padding: 6px 10px !important; }
      .bundle-btn { font-size: 0.78rem !important; padding: 8px 12px !important; }
      #victory-bg > .result-card > div:nth-child(2) { font-size: clamp(0.95rem, 4vw, 1.3rem) !important; word-break: break-word; overflow-wrap: break-word; }
    }

    /* Controls */
    .bundle-btn {
      font-family: 'DM Sans', sans-serif; font-weight: 700; border: none; border-radius: 12px;
      padding: 10px 18px; cursor: pointer; font-size: 0.85rem; letter-spacing: 0.01em;
      transition: transform 0.12s, box-shadow 0.12s, opacity 0.1s;
    }
    .bundle-btn:hover { transform: scale(1.025); }
    .bundle-btn:active { transform: scale(0.97); }
    .btn-gold { background: linear-gradient(135deg, #ffce4a, #f59e0b); color: #0a0a0f; box-shadow: 0 2px 12px rgba(251,191,36,0.28); }
    .btn-gold:hover { box-shadow: 0 4px 18px rgba(251,191,36,0.42); }
    .btn-green { background: linear-gradient(135deg, #34d399, #059669); color: white; box-shadow: 0 2px 10px rgba(16,185,129,0.25); }
    .btn-red { background: linear-gradient(135deg, #f87171, #ef4444); color: white; }
    .btn-ghost { background: rgba(255,255,255,0.08); color: #d0d0e0; border: 1px solid rgba(255,255,255,0.12); }

    /* Header — transparent so flag image bleeds through; blur keeps text readable */
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: rgba(10,10,15,0.12); backdrop-filter: blur(14px) saturate(1.2);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-logo-block { display: flex; flex-direction: column; text-decoration: none; line-height: 1.1; }
    .header-logo-title { font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 1.2rem; color: #fbbf24; letter-spacing: -0.5px; }
    .header-logo-sub { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 0.55rem; color: #fbbf24; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.8; margin-top: 1px; }
    .header-btns { display: flex; align-items: center; gap: 2px; }
    .header-btn {
      font-family: 'DM Sans', sans-serif; font-size: 1rem; padding: 6px 10px;
      background: none; border: none; color: #aaa; cursor: pointer; border-radius: 6px; transition: color 0.15s, background 0.15s;
    }
    .header-btn:hover { color: white; background: rgba(255,255,255,0.08); }
    .header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 2px; }

    /* FAQ hackathon section */
    .faq-hackathon { background: rgba(251,191,36,0.06); border: 1px solid rgba(251,191,36,0.25); border-radius: 12px; padding: 20px; margin-top: 16px; }
    .faq-hackathon-badge { display: inline-block; background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 6px; padding: 3px 10px; font-size: 0.72rem; font-weight: 700; color: #fbbf24; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 16px; }
    .faq-hackathon h2 { font-size: 1.1rem; font-weight: 700; color: #fbbf24; margin-bottom: 4px; }
    .faq-hackathon h3 { font-size: 0.95rem; font-weight: 700; color: #93c5fd; margin: 16px 0 8px; }

<body>
  <div class="bg" id="flag-bg"></div>
  <div id="app"></div>
  <div id="toast-container"></div>
  <audio id="home-bg-music" loop preload="auto">
    <source src="/audio/home-loop.mp3" type="audio/mpeg">
  </audio>

  <script>
  </script>

  <script>
  // ═══════════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════════
  // TOKEN — read once from URL on load, persist to both stores, then
  // strip ?token= from the URL so hash-changes can never drop it.
  // Every API call sends it as both header and ?token= query param.
  (function() {
    const params = new URLSearchParams(location.search);
    const t = params.get('token');
    if (t) {
      try { localStorage.setItem('usernode_token', t); } catch(_) {}
      try { sessionStorage.setItem('usernode_token', t); } catch(_) {}
      // Strip ?token= from URL so hash navigation can't accidentally drop it.
      params.delete('token');
      const newSearch = params.toString() ? '?' + params.toString() : '';
      try { history.replaceState(null, '', location.pathname + newSearch + location.hash); } catch(_) {}
    }
  })();

  function getToken() {
    // URL param (still present before replaceState completes in some envs) → sessionStorage → localStorage
    const u = new URLSearchParams(location.search).get('token');
    if (u) return u;
    try { const s = sessionStorage.getItem('usernode_token'); if (s) return s; } catch(_) {}
    try { return localStorage.getItem('usernode_token') || ''; } catch(_) {}
    return '';
  }
  const HEADERS = () => {
    const tok = getToken();
    return { 'Content-Type': 'application/json', ...(tok ? { 'x-usernode-token': tok } : {}) };
  };

  const STAGES = ['Group Match 1','Group Match 2','Group Match 3','Round of 16','Quarter-Final','Semi-Final','Final'];
  const QUIPS = ['Keeper saves it!','Over the bar!','Wide of the post!','Just a warm-up!','The crowd groans!','Close, but no cigar!','Offside — play on!','The woodwork rattles!','Into the wall!','Try again!'];

  const KNOCKOUT_PALETTES = {
    3: { accent: '#88C0D0', accent2: '#5E81AC', cardDeep: '#2E3440', name: 'Nord Frost' },
    4: { accent: '#34D399', accent2: '#2DD4BF', cardDeep: '#042F2E', name: 'Emerald Teal' },
    5: { accent: '#BD93F9', accent2: '#FF79C6', cardDeep: '#282A36', name: 'Dracula' },
    6: { accent: '#F9C846', accent2: '#E63946', cardDeep: '#1A1423', name: 'Champions Gold & Crimson' },
  };

  const REVEAL_VARIANTS = ['flip-miss', 'dissolving', 'reveal-zoom-burst', 'reveal-slide'];

  let state = {
    session: null, walletBalance: 1000, potBalance: 100,
    potLastWonAt: null, leaderState: null,
    game: null, gameTheme: null, credits: null,
    squaresRevealed: 0, prizePot: 148,
    gridSize: 36, gridCols: 6, pricing: { perShot: 5.5, bundle2: 11, bundle8: 44, bundle16: 88 },
    themes: [], polls: [],
    prevPotBalance: 100,
    pendingResult: null,
    revealVariantIdx: 0,
    testingMode: localStorage.getItem('testingMode') === 'true',
  };

  // ═══════════════════════════════════════════════════════════════
  // API
  // ═══════════════════════════════════════════════════════════════
  async function api(method, path, body) {
    const tok = getToken();
    // Pass token as both header (primary) and ?token= query param (fallback for mobile).
    let url = path;
    if (tok) {
      const sep = path.includes('?') ? '&' : '?';
      url = path + sep + 'token=' + encodeURIComponent(tok);
    }
    const opts = { method, headers: HEADERS() };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const r = await fetch(url, opts);
    return r;
  }

  // ═══════════════════════════════════════════════════════════════
  // UTILITIES
  // ═══════════════════════════════════════════════════════════════
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
  // Fraction-based prize curve — mirrors the server. Identical to the original
  // 0.30*(n-16) curve at N=36 (10.8 = 0.30*36, 0.4444 = 16/36).
  function prizeDecay(n, gridSize) {
    const N = gridSize || state.gridSize || 36;
    return Math.max(8, Math.floor(150 / (1 + Math.exp(10.8 * (n / N - 0.4444)))));
  }
  // Per-stage grid + columns, mirrors the server's gridSizeForStage/gridColsForStage.
  function gridSizeForStage(idx) {
    if (idx <= 2) return 16;
    if (idx <= 4) return 25;
    if (idx === 5) return 36;
    return 49;
  }
  function gridColsForStage(idx) {
    if (idx <= 2) return 4;
    if (idx <= 4) return 5;
    if (idx === 5) return 6;
    return 7;
  }
  // Captain's Pot tier floors, mirrors the server. Top-up entering a stage is
  // the floor jump when that stage is the first of a new (harder) tier:
  //   stage 3 → +60 (knockouts), stage 5 → +70 (semi), stage 6 → +90 (final).
  const POT_FLOORS = [100, 160, 230, 320];
  function potTierForStage(idx) {
    if (idx <= 2) return 0;
    if (idx <= 4) return 1;
    if (idx === 5) return 2;
    return 3;
  }
  function potTopupEnteringStage(idx) {
    if (idx <= 0) return 0;
    const t = potTierForStage(idx), prev = potTierForStage(idx - 1);
    return t > prev ? POT_FLOORS[t] - POT_FLOORS[prev] : 0;
  }
  function fmtTokens(n) { return Number.isInteger(n) ? String(n) : n.toFixed(1); }
  // Shot-purchase buttons, priced for the current stage.
  function shotButtonsHtml() {
    const p = state.pricing || { bundle2: 11, bundle8: 44, bundle16: 88 };
    return `<div style="display:flex;gap:4px;">

  // SOUND — NES/8-bit synth via Web Audio API (no audio files)
  // ═══════════════════════════════════════════════════════════════
  const Sound = {
    ctx: null,
    muted: (function(){ try { return localStorage.getItem('goal_muted') === '1'; } catch(_) { return false; } })(),
    async ensure() {
      if (this.muted) return null;
      try {
        if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (this.ctx.state === 'suspended') await this.ctx.resume();
        return this.ctx;
      } catch(_) { return null; }
    },
    tone(freq, start, dur, type, gain) {
      const ctx = this.ctx; if (!ctx) return;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.type = type || 'square';
      osc.frequency.setValueAtTime(freq, start);
      g.gain.setValueAtTime(0.0001, start);
      g.gain.exponentialRampToValueAtTime(gain || 0.18, start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, start + dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(start); osc.stop(start + dur + 0.02);
    },
    async blip() {
      const ctx = await this.ensure(); if (!ctx) return;
      const t = ctx.currentTime;
      this.tone(660, t, 0.08, 'square', 0.16);
      this.tone(990, t + 0.04, 0.06, 'square', 0.12);
    },
    async victory() {
      const ctx = await this.ensure(); if (!ctx) return;
      const t = ctx.currentTime;
      const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; // C5 E5 G5 C6 E6
      notes.forEach((f, i) => this.tone(f, t + i * 0.12, 0.16, 'square', 0.18));
      this.tone(1046.50, t + 0.6, 0.32, 'triangle', 0.2);
    },
    // Full ~32-bar 8-bit victory anthem: I-V-vi-IV in C major, a 16-beat lead
    // motif repeated/varied across four 8-bar sections with a bass line under it.
    async anthem() {
      const ctx = await this.ensure(); if (!ctx) return;
      this._anthemStop = false;
      const f = (m) => 440 * Math.pow(2, (m - 69) / 12); // MIDI → Hz
      const beat = 0.26; // ~115 BPM; 2 beats/bar → ~32 bars over 64 beats
      let t = ctx.currentTime + 0.06;
      // Lead: MIDI notes, 0 = rest. One value per beat.
      const motif = [72,0,76,79, 84,0,83,79, 76,79,81,79, 76,0,72,0];
      const lift  = [74,0,77,81, 86,0,84,81, 79,81,83,81, 84,0,86,0];
      const lead = [].concat(motif, motif, lift, motif);
      lead.forEach((m, i) => {
        if (m) this.tone(f(m), t + i * beat, beat * 0.92, 'square', 0.15);
      });
      // Bass: I-V-vi-IV (C-G-Am-F), one root every 4 beats, low octave.
      const roots = [48, 43, 45, 41]; // C3 G2 A2 F2
      for (let bar4 = 0; bar4 < lead.length / 4; bar4++) {
        const root = roots[bar4 % roots.length];
        const bt = t + bar4 * 4 * beat;
        this.tone(f(root), bt, beat * 1.8, 'triangle', 0.16);
        this.tone(f(root + 7), bt + 2 * beat, beat * 1.8, 'triangle', 0.12);
      }
      // Final flourish chord.
      const end = t + lead.length * beat;
      [60, 64, 67, 72].forEach((m, i) => this.tone(f(m), end + i * 0.05, 0.7, 'square', 0.14));
    },
    nationPlayed: null,
    nationCurrentSlug: null,
    nationLoopTimer: null,
    nationAnthem_data: {

      netherlands: { notes: [72,76,79,81, 84,0,81,79, 76,72,76,79, 80,0,82,0, 79,77,76,74, 72,76,79,81, 83,84,85,84, 82,81,79,0], beat: 0.24 },
      norway: { notes: [70,74,77,79, 82,0,79,77, 74,70,74,77, 78,0,80,0, 77,75,74,72, 70,74,77,79, 81,82,84,82, 80,79,77,0], beat: 0.24 },
      turkey: { notes: [63,67,70,72, 75,0,72,70, 67,63,67,70, 71,0,73,0, 70,68,67,65, 63,67,70,72, 74,75,77,75, 73,72,70,0], beat: 0.26 },

    },
    playNationAnthemOnce_internal(nationSlug) {
      const ctx = this.ctx; if (!ctx || this.muted) return;
      const f = (m) => 440 * Math.pow(2, (m - 69) / 12);
      const anthem = this.nationAnthem_data[nationSlug] || this.nationAnthem_data.brazil;
      let t = ctx.currentTime + 0.06;
      const beat = anthem.beat;
      anthem.notes.forEach((m, i) => {
        if (m) this.tone(f(m), t + i * beat, beat * 0.92, 'square', 0.12);
      });
      const bass = [48, 43, 45, 41];
      for (let bar = 0; bar < Math.ceil(anthem.notes.length / 4); bar++) {
        const root = bass[bar % bass.length];
        const bt = t + bar * 4 * beat;
        this.tone(f(root), bt, beat * 1.6, 'triangle', 0.10);
        this.tone(f(root + 7), bt + 2 * beat, beat * 1.6, 'triangle', 0.08);
      }
    },
    async nationAnthem(nationSlug) {
      if (this.muted) return;
      const ctx = await this.ensure(); if (!ctx) return;
      if (this.nationCurrentSlug === nationSlug && this.nationLoopTimer) return;
      if (this.nationLoopTimer) clearInterval(this.nationLoopTimer);
      this.nationCurrentSlug = nationSlug;
      const anthem = this.nationAnthem_data[nationSlug] || this.nationAnthem_data.brazil;
      const duration = (anthem.notes.length * anthem.beat) + 0.1;
      const playOnce = () => {
        if (!this.muted) this.playNationAnthemOnce_internal(nationSlug);
      };
      playOnce();
      this.nationLoopTimer = setInterval(playOnce, duration * 1000);
    },
    stopNationAnthem() {
      if (this.nationLoopTimer) clearInterval(this.nationLoopTimer);
      this.nationLoopTimer = null;
      this.nationCurrentSlug = null;
    },
    async crowdCheer() {
      if (this.muted) return;
      const ctx = await this.ensure(); if (!ctx) return;
      const f = (m) => 440 * Math.pow(2, (m - 69) / 12);
      const t = ctx.currentTime;
      const notes = [48, 60, 72];
      const durations = [0.15, 0.20, 0.25];
      const delays = [0, 0.05, 0.10];
      notes.forEach((m, i) => {
        const startTime = t + delays[i];
        const gain = 0.16 - (i * 0.03);
        this.tone(f(m), startTime, durations[i], 'square', gain);
      });
      const hiChord = [67, 72, 79];
      hiChord.forEach((m, i) => {
        const startTime = t + 0.15 + (i * 0.04);
        this.tone(f(m), startTime, 0.20, 'square', 0.12);
      });
    },

    homeLoopPlaying: false,
    startHomeLoop() {

      if (mute) {

  // ═══════════════════════════════════════════════════════════════
  function showToast(msg, duration) {
    duration = duration || 5000;
    const container = document.getElementById('toast-container');
    // Don't add a duplicate if the same message is already visible
    const existing = Array.from(container.children).find(c => c.textContent === msg);
    if (existing) return;
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity 0.3s'; setTimeout(() => el.remove(), 300); }, duration);
  }

  // ═══════════════════════════════════════════════════════════════
  // CAPTAIN'S POT ANIMATION
  // ═══════════════════════════════════════════════════════════════
  function animatePotValue(el, from, to, ms) {
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / ms, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      el.textContent = Math.round(from + (to - from) * ease).toLocaleString() + ' t';
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }
  function firePotPulse(chip) {
    const ring = document.createElement('div');
    ring.style.cssText = `position:absolute;inset:0;border-radius:8px;border:2px solid #fbbf24;animation:pot-pulse-ring 0.4s ease forwards;pointer-events:none;`;
    chip.style.position = 'relative';
    chip.appendChild(ring);
    setTimeout(() => ring.remove(), 450);
  }
  function firePotDelta(chip, delta) {
    const lbl = document.createElement('div');
    lbl.className = 'pot-delta';
    lbl.textContent = `⚡ +${delta.toFixed(1)}`;
    lbl.style.cssText = 'top:-10px;left:50%;transform:translateX(-50%);';
    chip.style.position = 'relative';
    chip.appendChild(lbl);
    setTimeout(() => lbl.remove(), 900);
  }
  function updatePotChips(newBalance, newLastWonAt, winnerName) {
    const prev = state.prevPotBalance;
    const jackpotHit = newLastWonAt && newLastWonAt !== state.potLastWonAt;

    document.querySelectorAll('.pot-chip-value').forEach(el => {
      const chip = el.closest('.pot-chip');
      if (jackpotHit) {
        animatePotValue(el, prev, 0, 1000);
        setTimeout(() => { animatePotValue(el, 0, newBalance, 500); }, 1000);
        if (chip) { setTimeout(() => { chip.style.background = 'white'; setTimeout(() => { chip.style.background = ''; }, 200); }, 1000); }
      } else if (newBalance > prev + 0.01) {
        animatePotValue(el, prev, newBalance, 600);
        if (chip) { firePotPulse(chip); firePotDelta(chip, newBalance - prev); }
      } else {
        el.textContent = Math.round(newBalance).toLocaleString() + ' t';
      }
      if (chip) {
        if (newBalance > 500) chip.classList.add('pot-heartbeat');
        else chip.classList.remove('pot-heartbeat');
      }
    });

    if (jackpotHit) {
      const who = winnerName || 'Someone';
      showToast(`⚡ JACKPOT! ${who} just won the Captain's Pot!`);
      state.potLastWonAt = newLastWonAt;
    }
    state.prevPotBalance = newBalance;
    state.potBalance = newBalance;
  }

  async function checkAdminStatus() {
    // For now, show reset button to all users for testing
    const adminSection = document.getElementById('admin-reset-section');
    if (adminSection) {
      adminSection.style.display = 'block';
    }
  }

  function clearFrontendState() {
    state = {
      session: null, walletBalance: null, potBalance: 100,
      potLastWonAt: null, leaderState: null,
      game: null, gameTheme: null, credits: null,
      squaresRevealed: 0, prizePot: 148,
      gridSize: 36, gridCols: 6, pricing: { perShot: 5.5, bundle2: 11, bundle8: 44, bundle16: 88 },
      themes: [], polls: [],
      prevPotBalance: 100,
      pendingResult: null,
      revealVariantIdx: 0,
    };
  }

  function confirmResetGame() {
    const confirmed = confirm('This will clear all game data and reset all player balances to 2000 tokens. Continue?');
    if (!confirmed) return;
    resetGame();
  }

  async function resetGame() {
    try {
      const r = await api('POST', '/api/admin/reset-game');
      if (r.ok) {
        showToast('Game reset complete');
        clearFrontendState();
        setTimeout(() => location.reload(), 500);
      } else {
        const err = await r.json();
        showToast('Reset failed: ' + (err.error || 'Unknown error'));
      }
    } catch (err) {
      showToast('Reset failed: ' + err.message);
    }
  }

  function route() {
    clearPolls();
    stopConfetti();
    const hash = location.hash || '#lobby';
    if (hash !== '#lobby' && hash !== '#') {
      stopNationAnthem();
      Sound.stopHomeLoop();
    }
    document.getElementById('goal-ball')?.remove();
    const flagBgEl = document.getElementById('flag-bg');
    if (flagBgEl) {
      flagBgEl.style.backgroundImage = '';
      flagBgEl.style.setProperty('--overlay-opacity', '1');
    }
    document.documentElement.style.removeProperty('--accent');
    document.documentElement.style.removeProperty('--accent-soft');
    if (hash === '#lobby' || hash === '#') renderLobby();
    else if (hash.startsWith('#game/')) renderGame(hash.replace('#game/', ''));
    else if (hash === '#league') renderLeague();
    else if (hash === '#faq') renderFaq();
    else renderLobby();
  }
  window.addEventListener('hashchange', route);

  // LOBBY
  // ═══════════════════════════════════════════════════════════════
  async function renderLobby() {
    const app = document.getElementById('app');
    app.innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;">
      ${renderHeader()}
      <div id="lobby-body" style="flex:1;max-width:480px;margin:0 auto;padding:12px 16px 20px;width:100%;">
        <div style="text-align:center;padding:40px 0;color:#555;">Loading...</div>
      </div>
    </div>`;
    await loadLobby();
  }

  async function loadLobby() {
    const body = document.getElementById('lobby-body');
    function showLobbyError(msg, isAuth) {
      console.error('Lobby error:', msg);
      const tokenDebug = isAuth ? (() => {
        const tok = getToken();
        const hasSS = (() => { try { return !!sessionStorage.getItem('usernode_token'); } catch(_) { return false; } })();
        const hasLS = (() => { try { return !!localStorage.getItem('usernode_token'); } catch(_) { return false; } })();
        return `<p style="margin-top:12px;font-size:0.7rem;font-family:monospace;color:#71717a;">
          token in memory: ${tok ? '✓' : '✗'} &nbsp;|&nbsp;
          sessionStorage: ${hasSS ? '✓' : '✗'} &nbsp;|&nbsp;
          localStorage: ${hasLS ? '✓' : '✗'}
        </p>
        <p style="margin-top:8px;font-size:0.75rem;color:#a1a1aa;font-family:'DM Sans',sans-serif;">Sign in via Usernode to play.</p>`;
      })() : '';
      if (body) body.innerHTML = `<div style="text-align:center;padding:40px;font-family:'DM Sans',sans-serif;">
        <p style="color:#f87171;">Error loading lobby: ${msg}</p>${tokenDebug}
      </div>`;
    }
    try {
      const sessionRes = await api('GET', '/api/session');
      if (!sessionRes.ok) {
        let detail = 'HTTP ' + sessionRes.status;
        try { const e = await sessionRes.json(); if (e && e.error) detail += ' — ' + e.error; } catch(_) {}
        showLobbyError(detail, sessionRes.status === 401);
        return;
      }
      const data = await sessionRes.json();
      const session = data.session;
      const captain_pot_balance = data.captain_pot_balance;
      let wallet_balance = data.wallet_balance;
      const next_opponent_theme = data.next_opponent_theme;

      state.session = session;
      state.next_opponent_theme = next_opponent_theme;
      state.walletBalance = wallet_balance || 1000;
      state.potBalance = captain_pot_balance || 100;
      state.prevPotBalance = state.potBalance;
      // Seed the last-won marker from the server so the first poll doesn't
      // mistake a pre-existing win for a fresh one (phantom broadcast).
      if (data.last_won_at) state.potLastWonAt = data.last_won_at;

      renderLobbyBody(session);
      setupLobbyPolls();
    } catch(e) {
      showLobbyError(e && e.message ? e.message : String(e));
    }
  }

  // ── Home-page info panel ───────────────────────────────────────────────────
  // Minimal pop-up: just the basics, always dismissible. The header (title + ×)
  // and "Got it" button stay fixed; only the short body scrolls if a tiny
  // viewport ever needs it, so the close controls can never be pushed off-screen.
  function infoPanelHtml() {
    return `<div class="modal-box" style="text-align:left;max-width:360px;max-height:85vh;display:flex;flex-direction:column;padding:18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex:0 0 auto;">
        <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:0.9rem;color:#fbbf24;">How GOAL! works</div>
        <button onclick="dismissInfoPanel(this.closest('.modal-bg'))" aria-label="Close" style="background:none;border:none;color:#aaa;font-size:1.6rem;cursor:pointer;line-height:1;padding:0 6px;">×</button>
      </div>
      <ul style="padding-left:18px;margin:0 0 14px;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:#cfcfe0;line-height:1.5;flex:1 1 auto;overflow-y:auto;min-height:0;">
        <li style="margin-bottom:8px;"><strong>The board grows each stage</strong> — small in the group games, bigger in the knockouts, biggest in the final.</li>
        <li style="margin-bottom:8px;"><strong>Shot price changes by stage</strong> so a typical board costs about the same throughout.</li>
        <li><strong>The Captain's Pot</strong> jackpot grows as you advance — win it by finding the ball on your very first shot.</li>
      </ul>
      <button class="bundle-btn btn-gold" style="width:100%;flex:0 0 auto;" onclick="dismissInfoPanel(this.closest('.modal-bg'))">Got it</button>
      <div style="text-align:center;margin-top:8px;flex:0 0 auto;"><a href="#faq" onclick="dismissInfoPanel(document.getElementById('info-panel'))" style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:#9ca3af;text-decoration:underline;">Full details in the FAQ</a></div>
    </div>`;
  }
  function showInfoPanel() {
    if (document.getElementById('info-panel')) return;
    const modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.id = 'info-panel';
    modal.innerHTML = infoPanelHtml();
    document.body.appendChild(modal);
  }
  window.openInfoPanel = function() { showInfoPanel(); };
  window.dismissInfoPanel = function(modal) {
    try { localStorage.setItem('goal_info_seen', '1'); } catch(_) {}
    if (modal) modal.remove();
    else { const m = document.getElementById('info-panel'); if (m) m.remove(); }
  };
  function maybeAutoShowInfo() {
    let seen = false;
    try { seen = localStorage.getItem('goal_info_seen') === '1'; } catch(_) {}
    if (!seen) showInfoPanel();
  }

  function setupLobbyPolls() {
    state.polls.push(setInterval(async () => {
      try {
        const r = await api('GET', '/api/captain-pot');
        if (!r.ok) return;
        const d = await r.json();
        updatePotChips(d.balance, d.last_won_at, d.last_winner_username);
      } catch {}
    }, 5000));
    state.polls.push(setInterval(pollLeagueForToast, 3000));
  }

  window.pickNation = async function(slug) {
    const r = await api('POST', '/api/session', { my_team_slug: slug });
    if (!r.ok) { const e = await r.json().catch(()=>({})); showToast(e.error || 'Error creating session'); return; }
    const { session } = await r.json();
    state.session = session;
    // Start first map automatically
    startNewMap();
  };

  async function doStartNewMap() {
    const r = await api('POST', '/api/session/start-map');
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      showToast(e.error || 'Error starting map');
      return;
    }
    const d = await r.json();
    state.session = d.session;
    navigate('#game/' + d.game.id);
  }

  window.startNewMap = async function() {
    if (!state.session) { showToast('Pick a nation first'); return; }
    const r = await api('GET', '/api/session');
    if (!r.ok) {
      showToast('Error loading session. Please try again.');
      return;
    }
    const d = await r.json();
    state.session = d.session;
    state.next_opponent_theme = d.next_opponent_theme;
    if (!state.session) { showToast('Pick a nation first'); return; }
    doStartNewMap();
  };

  function showPotTopupPopup(stageIdx, amount) {
    const tierLabel = stageName(stageIdx);
    const modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.innerHTML = `<div class="modal-box" style="text-align:center;">
      <div style="font-size:2.2rem;margin-bottom:6px;">⚡</div>
      <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:1.15rem;color:#fbbf24;margin-bottom:8px;line-height:1.25;">${amount} tokens now added to the Captain's Pot</div>
      <p style="font-size:0.85rem;color:#aaa;margin-bottom:10px;font-family:'DM Sans',sans-serif;">You're entering the ${tierLabel}. The board grows and the odds get longer — so the jackpot grows with it.</p>
      <div style="font-family:'Space Mono',monospace;color:#fff;font-size:0.9rem;margin-bottom:18px;">Captain's Pot now ${Math.round(state.potBalance).toLocaleString()} t</div>
      <button class="bundle-btn btn-gold" style="width:100%;" onclick="confirmStartMatch(this.closest('.modal-bg'))">Start ${tierLabel} ▶</button>
    </div>`;

  }
  window.confirmStartMatch = function(modal) {
    if (modal) modal.remove();
    doStartNewMap();
  };

  window.joinMap = async function(id) {
    if (!state.session) { showToast('Pick a nation first to join a map'); return; }
    const r = await api('POST', `/api/games/${id}/join`);
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      showToast(e.error || 'Map no longer available');
      return;
    }
    const d = await r.json();
    state.session = d.session;
    navigate('#game/' + id);
  };

  // ═══════════════════════════════════════════════════════════════
  // GAME BOARD
  // ═══════════════════════════════════════════════════════════════
  async function renderGame(id) {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="game-screen">
      ${renderHeader()}
      <div id="game-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:2;">
        <div style="text-align:center;padding:40px;color:#555;">Loading game...</div>
      </div>
    </div>`;
    await loadGame(id);
  }

  async function loadGame(id) {
    try {
      const r = await api('GET', `/api/games/${id}`);
      if (!r.ok) { navigate('#lobby'); return; }
      const d = await r.json();
      state.game = d.game;
      state.gameTheme = { slug: d.game.slug, country_name: d.game.country_name, accent_colour: d.game.accent_colour, footballer_name: d.game.footballer_name };
      state.credits = d.credits;
      state.walletBalance = d.wallet_balance;
      state.potBalance = d.captain_pot_balance;
      state.prevPotBalance = d.captain_pot_balance;
      state.squaresRevealed = d.squares_revealed;
      state.prizePot = d.prize_pot;
      state.gridSize = d.grid_size || gridSizeForStage(d.game.stage_idx);
      state.gridCols = d.grid_cols || gridColsForStage(d.game.stage_idx);
      if (d.pricing) state.pricing = d.pricing;

      // If game is completed, go back to lobby
      if (d.game.status === 'completed') { navigate('#lobby'); return; }

      renderGameBody();
      setupGamePolls(id);
      startKeepalive(id);
    } catch(e) {
      console.error('Game load error', e);
    }
  }

  function renderGameBody() {
    const game = state.game;
    const theme = state.gameTheme;

    // Set full-window flag background (opponent theme image) + CSS accent vars
    const flagBgEl = document.getElementById('flag-bg');
    if (flagBgEl) {
      flagBgEl.style.backgroundImage = `url('/images/themes/${theme.slug}.png'), ${flagGradient(theme.accent_colour)}`;
    }
    document.documentElement.style.setProperty('--accent', theme.accent_colour);
    document.documentElement.style.setProperty('--accent-soft', hexToRgba(theme.accent_colour, 0.33));

    const myTeam = state.themes.find(t => t.slug === (state.session ? state.session.my_team_slug : ''));
    const stageIdx = state.session ? state.session.stage_idx : game.stage_idx;

    // Portrait behind tiles — footballer image or trophy for final
    const portraitUrl = stageIdx >= 6
      ? '/images/trophy-reveal.jpg'
      : `/images/footballers/${theme.slug}.png`;

    const hud = `<div class="game-hud">
      <div class="hud-chip"><span style="display:block;">${t('game.wallet_label')}</span><span class="val wallet-val">${Math.round(state.walletBalance)} t</span></div>
      <div class="hud-chip"><span style="display:block;">${t('game.prize_label')}</span><span class="val prize-val" style="color:#fbbf24;">${state.prizePot} t</span></div>
      ${potChipHtml(state.potBalance)}
      <div class="hud-chip"><span style="display:block;">${t('game.shots_label')}</span><span class="val shots-val">${state.squaresRevealed}</span></div>
    </div>`;

    const myFlag = myTeam ? (FLAG_SVGS[myTeam.slug] ? `<img class="flag-mini" src="${FLAG_SVGS[myTeam.slug]}" alt="${myTeam.country_name}">` : `<div class="flag-mini" style="background:${flagGradient(myTeam.accent_colour)};"></div>`) : '';
    const oppFlag = FLAG_SVGS[theme.slug] ? `<img class="flag-mini" src="${FLAG_SVGS[theme.slug]}" alt="${theme.country_name}">` : `<div class="flag-mini" style="background:${flagGradient(theme.accent_colour)};"></div>`;
    const nationStrip = `<div class="nation-strip">
      ${myFlag}<span style="font-weight:700;color:#f0f0f5;">${myTeam ? myTeam.country_name : 'You'} <span style="color:#fbbf24;font-weight:600;">(you)</span></span>
      <span style="color:#fbbf24;font-weight:900;font-size:0.8rem;margin:0 4px;text-shadow:0 0 8px rgba(251,191,36,0.6);letter-spacing:0.05em;">v</span>
      ${oppFlag}<span style="font-weight:700;color:#f0f0f5;">${theme.country_name}</span>
      <span style="margin-left:auto;background:rgba(0,0,0,0.55);border:1px solid rgba(251,191,36,0.5);border-radius:5px;padding:1px 7px;color:#fbbf24;font-size:0.6rem;font-family:'Space Mono',monospace;white-space:nowrap;text-transform:uppercase;letter-spacing:0.06em;box-shadow:0 0 6px rgba(251,191,36,0.2);">${stageName(stageIdx)}</span>
    </div>`;

    // Build tiles for this stage's grid; open tiles show portrait beneath
    const gridSize = state.gridSize || gridSizeForStage(stageIdx);
    const gridCols = state.gridCols || gridColsForStage(stageIdx);
    const revealed = game.revealed || new Array(gridSize).fill(false);
    let tiles = '';
    for (let i = 0; i < gridSize; i++) {
      const isOpen = revealed[i];
      tiles += `<div class="tile${isOpen ? ' open' : ''}" data-idx="${i}" onclick="${isOpen ? '' : `onCellClick(${i})`}"></div>`;
    }

    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    let controls = '';
    if (credRemaining > 0) {
      controls = `<div class="credits-chip">${t('game.shots_remaining', {count: credRemaining, plural: credRemaining !== 1 ? 's' : ''})}</div>`;
    } else {
      controls = shotButtonsHtml();
    }

    const initialHint = `${stageName(stageIdx)} — find the ball to knock out ${theme.country_name}`;

    document.getElementById('game-body').innerHTML = `
      ${hud}
      ${nationStrip}
      <div class="board-zone" id="board-zone">
        <div class="board-wrap">
          <div class="portrait" style="background-image:url('${portraitUrl}')"></div>
          <div class="board game-grid" id="game-grid" style="grid-template-columns:repeat(${gridCols},1fr);">
            ${tiles}
          </div>
          <div class="reveal" id="board-reveal"></div>
        </div>
      </div>
      <div class="game-footer">
        <div id="controls-row" style="margin-bottom:2px;">${controls}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:1px 0;">
          <div id="hint-bar" class="font-dm" style="font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${initialHint}</div>
          <span class="font-dm" style="font-size:10px;color:#3a3a50;cursor:pointer;text-decoration:underline;flex-shrink:0;margin-left:8px;" onclick="leaveMap(${game.id})">Leave Map</span>
        </div>
      </div>`;

    // Match-start animation: fade in tiles sequentially with sparkle
    // First, hide portrait initially with transition ready
    const portraitEl = document.querySelector('.portrait');
    if (portraitEl) {
      portraitEl.style.transition = 'opacity 0.6s ease';
      portraitEl.style.opacity = '0';
    }

    // Apply random fade-in animation to tiles (spread over ~2.5 seconds with sparkles)
    const tiles_list = document.querySelectorAll('.tile');
    tiles_list.forEach((tile) => {
      tile.classList.add('tile-spawn');
      // Random delay between 0 and 2000ms so tiles appear randomly throughout 2.5s window
      // (accounting for 0.4s spawn animation, tiles finish by 2.4s total)
      tile.style.animationDelay = (Math.random() * 2000) + 'ms';
    });

    // After all tiles finish animating, apply full-board sparkle flash
    setTimeout(() => {
      tiles_list.forEach((tile) => {
        tile.classList.add('tile-sparkle-flash');
      });
    }, 2500);

    // After all tiles finish animating and sparkle flash, fade in the portrait
    setTimeout(() => {
      if (portraitEl) {
        portraitEl.style.transition = 'opacity 0.5s ease';
        portraitEl.style.opacity = '1';
      }
    }, 3000);
  }

  function updateHud() {
    const wv = document.querySelector('.wallet-val'); if (wv) wv.textContent = Math.round(state.walletBalance) + ' t';
    const lwv = document.querySelector('.lobby-wallet-val'); if (lwv) lwv.textContent = Math.round(state.walletBalance).toLocaleString() + ' t';
    const pv = document.querySelector('.prize-val'); if (pv) pv.textContent = prizeDecay(state.squaresRevealed, state.gridSize) + ' t';
    const sv = document.querySelector('.shots-val'); if (sv) sv.textContent = state.squaresRevealed;
  }

  function updateCreditsDisplay() {
    const row = document.getElementById('controls-row');
    if (!row) return;
    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    if (credRemaining > 0) {
      row.innerHTML = `<div class="credits-chip">${t('game.shots_remaining', {count: credRemaining, plural: credRemaining !== 1 ? 's' : ''})}</div>`;
    } else {
      row.innerHTML = shotButtonsHtml();
    }
  }

  window.onCellClick = async function(idx) {
    const game = state.game;
    if (!game || game.status !== 'active') return;
    if (!game.revealed || game.revealed.length !== (state.gridSize || 36)) {
      game.revealed = new Array(state.gridSize || 36).fill(false);
    }
    if ((game.revealed || [])[idx]) return;

    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    const sessId = (credRemaining > 0 && state.credits) ? state.credits.id : null;

    if (!sessId) {
      const p = state.pricing || { bundle2: 11, bundle8: 44, bundle16: 88 };
      const modal = document.createElement('div');
      modal.className = 'modal-bg';
      modal.innerHTML = `<div class="modal-box">
        <div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:12px;">${t('game.out_of_shots_title')}</div>
        <p style="font-size:0.85rem;color:#ccc;margin-bottom:16px;font-family:'DM Sans',sans-serif;">${t('game.out_of_shots_desc')}</p>
        <div style="display:flex;gap:10px;flex-direction:column;">
          <button class="bundle-btn btn-gold" style="width:100%;" onclick="const m = this.closest('.modal-bg'); m.remove(); buyBundle(2).then(() => {});">${t('game.buy_2')} — ${fmtTokens(p.bundle2)} tokens</button>
          <button class="bundle-btn btn-gold" style="width:100%;" onclick="const m = this.closest('.modal-bg'); m.remove(); buyBundle(8).then(() => {});">${t('game.buy_8')} — ${fmtTokens(p.bundle8)} tokens</button>
          <button class="bundle-btn btn-gold" style="width:100%;" onclick="const m = this.closest('.modal-bg'); m.remove(); buyBundle(16).then(() => {});">${t('game.buy_16')} — ${fmtTokens(p.bundle16)} tokens</button>
          <button class="bundle-btn btn-ghost" style="width:100%;" onclick="this.closest('.modal-bg').remove()">${t('game.close')}</button>
        </div>
      </div>`;
      document.body.appendChild(modal);
      return;
    }
    playBlip();

    const body = { square_index: idx };
    if (sessId) body.session_id = sessId;

    // Disable board during request
    document.querySelectorAll('.tile:not(.open)').forEach(c => c.style.pointerEvents = 'none');

    try {
      const r = await api('POST', `/api/games/${game.id}/guess`, body);
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        showToast(e.error || 'Guess failed');
        document.querySelectorAll('.tile').forEach(c => c.style.pointerEvents = '');
        return;
      }
      const d = await r.json();

      // Update state
      if (!game.revealed) game.revealed = new Array(state.gridSize || 36).fill(false);
      game.revealed[idx] = true;
      state.squaresRevealed = d.squares_revealed;
      state.walletBalance = d.wallet_balance;
      state.prizePot = prizeDecay(state.squaresRevealed, state.gridSize);
      if (state.credits && sessId && state.credits.credits_remaining !== undefined) {
        const currentRemaining = parseInt(state.credits.credits_remaining) || 0;
        if (currentRemaining > 0) {
          state.credits.credits_remaining = currentRemaining - 1;
        }
      }

      // If THIS player just won the jackpot, record their win timestamp so the
      // broadcast toast (meant for everyone else) is suppressed for them when
      // polling resumes after the celebration.
      if (d.jackpot_paid > 0 && d.last_won_at) state.potLastWonAt = d.last_won_at;
      updatePotChips(d.pot_balance, null);
      updateHud();
      updateCreditsDisplay();

      const cell = document.querySelector(`.tile[data-idx="${idx}"]`);
      if (d.hit) {
        await runWinSequence(cell, idx, d);
      } else {
        // Miss — rotate reveal variant + optionally double speed
        if (cell) {
          const variant = REVEAL_VARIANTS[state.revealVariantIdx % REVEAL_VARIANTS.length];
          state.revealVariantIdx++;
          const isFast = Math.random() < 0.33;
          const baseDuration = variant === 'flip-miss' ? 0.62 : variant === 'dissolving' ? 0.42 : 0.62;
          const actualDuration = isFast ? baseDuration * 0.5 : baseDuration;
          cell.classList.add(variant);
          if (isFast) cell.classList.add('reveal-fast');
          const cleanupTime = Math.round(actualDuration * 1000);
          setTimeout(() => { cell.classList.add('open'); cell.classList.remove(variant); if (isFast) cell.classList.remove('reveal-fast'); cell.style.pointerEvents = 'none'; }, cleanupTime);
        }
        // Update hint bar
        const hint = document.getElementById('hint-bar');
        if (hint) hint.textContent = QUIPS[Math.floor(Math.random() * QUIPS.length)];
        document.querySelectorAll('.tile:not(.open)').forEach(c => c.style.pointerEvents = '');
      }
    } catch(e) {
      console.error('Guess error', e);
      document.querySelectorAll('.tile').forEach(c => c.style.pointerEvents = '');
    }
  };

  // ═══════════════════════════════════════════════════════════════
  // GOAL CELEBRATION
  // ═══════════════════════════════════════════════════════════════
  function playGoalCelebration(accentColor, isFinal) {
    const stageIdx = state.session ? state.session.stage_idx : state.game.stage_idx;
    const animationStart = performance.now();

    // Screen shake (0–600ms)
    const app = document.getElementById('app');
    if (app) app.classList.add('screen-shake');
    setTimeout(() => app && app.classList.remove('screen-shake'), 600);

    // Shockwave pulse from center (0–800ms)
    const shockwave = document.createElement('div');
    shockwave.className = 'shockwave';
    shockwave.style.borderColor = accentColor || '#fbbf24';
    document.body.appendChild(shockwave);
    setTimeout(() => shockwave.remove(), 800);

    // Confetti burst (15 particles, all removed at 2200ms)
    for (let i = 0; i < 15; i++) {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      const chars = ['🎉', '⭐', '✨', '🌟', '💫'];
      confetti.textContent = chars[Math.floor(Math.random() * chars.length)];

      const angle = (Math.random() * 360) * (Math.PI / 180);
      const velocity = 120 + Math.random() * 180;
      const tx = Math.cos(angle) * velocity;
      const ty = Math.sin(angle) * velocity - 60; // gravity offset
      const rot = Math.random() * 720;

      confetti.style.setProperty('--tx', tx + 'px');
      confetti.style.setProperty('--ty', ty + 'px');
      confetti.style.setProperty('--rot', rot + 'deg');
      confetti.style.left = '50%';
      confetti.style.top = '50%';
      confetti.style.marginLeft = '-0.6rem';
      confetti.style.marginTop = '-0.6rem';

      document.body.appendChild(confetti);
      setTimeout(() => confetti.remove(), 2200);
    }

    // Floating emojis (5 emojis floating upward, staggered, all done by 2400ms + stagger)
    const emojiSet = ['⚽', '⭐', '🎊'];
    for (let i = 0; i < 5; i++) {
      const emoji = document.createElement('div');
      emoji.className = 'floating-emoji';
      emoji.textContent = emojiSet[Math.floor(Math.random() * emojiSet.length)];

      const xPos = 20 + Math.random() * 60;
      emoji.style.left = xPos + '%';
      emoji.style.bottom = '10%';
      emoji.style.animation = `emoji-float 2.4s ease-out ${i * 0.15}s forwards`;

      document.body.appendChild(emoji);
      setTimeout(() => emoji.remove(), 2400 + i * 150);
    }

    // GOAL text overlay (appears at 0, removed at 2600ms)
    const goalOverlay = document.createElement('div');
    goalOverlay.style.cssText = `
      position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      z-index:280;pointer-events:none;text-align:center;
    `;

    const goalText = isFinal ? t('celebration.champions') : t('celebration.goal');
    const subtitleText = isFinal ? t('celebration.won_cup') : t('celebration.scored');
    const fontSize = isFinal ? '4.5rem' : '5.5rem';

    goalOverlay.innerHTML = `
      <div class="goal-text" style="
        font-family:'DM Sans',sans-serif;font-size:${fontSize};font-weight:900;
        color:${accentColor || '#fbbf24'};
        text-shadow:0 0 20px ${accentColor || '#fbbf24'}77,
                    0 4px 12px rgba(0,0,0,0.8);
        line-height:1;margin:0;
      ">${goalText}</div>
      <div class="goal-subtitle" style="
        font-family:'DM Sans',sans-serif;font-size:1rem;
        color:#ccc;margin-top:8px;letter-spacing:0.05em;
        text-transform:uppercase;font-weight:600;
      ">${subtitleText}</div>
    `;

    document.body.appendChild(goalOverlay);
    setTimeout(() => goalOverlay.remove(), 2600);
  }

  // ═══════════════════════════════════════════════════════════════
  // WIN SEQUENCE
  // ═══════════════════════════════════════════════════════════════
  async function runWinSequence(hitCell, idx, result) {
    clearPolls();
    playVictoryJingle();
    const isFinal = (state.session && state.session.stage_idx >= 6) || result.interstitial === 'final_win';
    const theme = state.gameTheme;
    const stageIdx = state.session ? state.session.stage_idx : state.game.stage_idx;

    // Play goal celebration with palette-aware colors
    const palette = stageIdx >= 3 ? KNOCKOUT_PALETTES[stageIdx] : null;
    const accentColor = palette ? palette.accent : '#fbbf24';

    // Hide portrait and dim overlay at start so flag background is fully visible during celebration
    const portraitEl = document.querySelector('.portrait');
    if (portraitEl) {
      portraitEl.style.opacity = '0';
    }
    const flagBgEl = document.getElementById('flag-bg');
    if (flagBgEl) {
      flagBgEl.style.setProperty('--overlay-opacity', '0');
    }

    await Sound.crowdCheer();
    playGoalCelebration(accentColor, isFinal);

    // Start tile exit animation immediately (at 0s) when celebration words appear
    document.querySelectorAll('.tile').forEach((tile, idx) => {
      tile.classList.add('tile-exit');
      // Stagger the animation start with a random delay for visual interest
      tile.style.animationDelay = (Math.random() * 0.3) + 'ms';
      // After animation completes, mark as open for CSS transparency
      setTimeout(() => { tile.classList.add('open'); }, 800);
    });

    // Skip flag to allow touch/click to skip to result card
    let skipWinSequence = false;
    let resultShown = false;
    const boardZone = document.getElementById('board-zone');

    const skipHandler = () => {
      skipWinSequence = true;
      // Don't remove listeners here; let the showResult function do cleanup
    };

    boardZone && boardZone.addEventListener('click', skipHandler);
    boardZone && boardZone.addEventListener('touchstart', skipHandler);

    // Helper to show result card and clean up
    const showResult = async () => {
      // Prevent showing result multiple times
      if (resultShown) return;
      resultShown = true;

      // Remove event listeners to prevent multiple taps
      boardZone && boardZone.removeEventListener('click', skipHandler);
      boardZone && boardZone.removeEventListener('touchstart', skipHandler);
      stopConfetti();
      document.getElementById('goal-ball')?.remove();
      document.querySelectorAll('.tile').forEach(c => { c.classList.add('open'); });

      let resultTitle = 'You found the net!';
      if (result.jackpot_paid > 0) resultTitle = "Captain's Jackpot!";
      else if (isFinal) resultTitle = 'Champions of the World!';
      else if (stageIdx >= 3) resultTitle = `${theme.country_name} knocked out!`;

      state.pendingResult = result;
      const resultCard = document.createElement('div');
      resultCard.className = 'result-overlay';
      resultCard.style.cssText = `position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);`;
      const icon = isFinal ? '🏆' : '⚽';
      resultCard.innerHTML = `
        <div class="result-card">
          <div style="font-size:2rem;margin-bottom:8px;">${icon}</div>
          <div style="font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;">${resultTitle}</div>
          ${result.jackpot_paid > 0 && !isFinal ? `<div style="font-size:0.85rem;color:#aaa;margin-bottom:4px;">${stageIdx >= 3 ? theme.country_name + ' knocked out!' : 'You found the net!'}</div>` : ''}
          <div style="font-family:'Space Mono',monospace;color:#fbbf24;font-size:1.1rem;margin:12px 0;">+${result.prize_paid} tokens</div>
          ${result.jackpot_paid > 0 ? `<div style="font-family:'Space Mono',monospace;color:#fff;font-size:0.9rem;margin-bottom:4px;">⚡ Captain's Pot: +${Math.round(result.jackpot_paid)} tokens</div>` : ''}
          ${result.pot_topup > 0 ? `<div style="font-family:'DM Sans',sans-serif;color:#fbbf24;font-size:0.82rem;margin:8px 0 4px;line-height:1.3;">⚡ ${result.pot_topup} tokens added to the Captain's Pot — ${stageName(result.new_stage_idx)} odds!</div>` : ''}
          ${result.credits_refunded > 0 ? `<div style="font-size:0.8rem;color:#888;margin-bottom:8px;">Bundle refund: +${result.credits_refunded.toFixed(1)} t</div>` : ''}
          <button class="bundle-btn btn-gold" style="width:100%;margin-top:12px;" onclick="handleInterstitial()">Continue →</button>
        </div>`;
      document.body.appendChild(resultCard);

      if (result.new_stage_idx !== null) {
        if (state.session) state.session.stage_idx = result.new_stage_idx;
      }
    };

    // Step 1: shake hit tile (800ms)
    if (hitCell) hitCell.classList.add('shake');

    // Create banner immediately so it appears with ball animation
    let banner = 'GOAL!';
    if (result.jackpot_paid > 0) banner = 'HOLE IN ONE!';
    else if (isFinal) banner = 'WORLD CHAMPIONS!';
    else if (stageIdx >= 3) banner = 'You won!';

    const bannerEl = document.createElement('div');
    bannerEl.style.cssText = `position:absolute;top:20px;left:0;right:0;text-align:center;z-index:60;animation:toast-in 0.5s ease;`;

    // Pick a random 80s GOAL text treatment
    const goalTreatments = ['goal-neon-flicker', 'goal-marquee', 'goal-stack-pulse'];
    const selectedTreatment = goalTreatments[Math.floor(Math.random() * goalTreatments.length)];

    if (selectedTreatment === 'goal-marquee') {
      bannerEl.innerHTML = `<span class="goal-marquee" style="font-family:'DM Sans',sans-serif;font-size:2rem;font-weight:900;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,0.7);display:inline-block;">GOAL! GOAL! GOAL!</span>`;
    } else {
      bannerEl.innerHTML = `<span class="${selectedTreatment}" style="font-family:'DM Sans',sans-serif;font-size:2rem;font-weight:900;display:inline-block;text-shadow:0 0 20px rgba(251,191,36,0.7);">${banner}</span>`;
    }
    boardZone && boardZone.appendChild(bannerEl);

    // Create name tag but don't append yet — will show after 5s portrait reveal
    const nameTag = document.createElement('div');
    nameTag.style.cssText = `position:absolute;bottom:12px;left:0;right:0;text-align:center;z-index:60;padding:0 8px;`;
    const footballerText = isFinal ? 'World Cup Trophy 🏆' : `${theme.footballer_name} — ${theme.country_name}`;
    const fact = !isFinal ? (FOOTBALLER_FACTS[theme.slug] || '') : '';
    const factHtml = fact ? `<div style="font-family:'DM Sans',sans-serif;font-size:clamp(0.6rem, 1.5vw, 0.68rem);font-style:italic;color:#fbbf24;margin-top:4px;line-height:1.35;max-width:90vw;word-wrap:break-word;overflow-wrap:break-word;">${fact}</div>` : '';
    nameTag.innerHTML = `<div style="display:inline-block;max-width:90vw;background:rgba(0,0,0,0.84);padding:7px 14px 8px;border-radius:16px;text-align:center;">
      <div style="font-family:'DM Sans',sans-serif;font-size:clamp(0.7rem, 2vw, 0.9rem);color:white;font-weight:600;max-width:90vw;word-wrap:break-word;overflow-wrap:break-word;">${footballerText}</div>
      ${factHtml}
    </div>`;

    startConfetti();

    // Stop confetti after 3 seconds
    const confettiStopTimer = setTimeout(() => { stopConfetti(); }, 3000);

    await sleep(800);
    if (skipWinSequence) { clearTimeout(confettiStopTimer); return showResult(); }

    // Step 2: float football/trophy to centre — total 2s from start
    const icon = isFinal ? '🏆' : '⚽';
    const objEl = document.createElement('div');
    objEl.id = 'goal-ball';
    objEl.style.cssText = `position:fixed;font-size:80px;z-index:200;pointer-events:none;transition:all 0.6s cubic-bezier(.22,1,.36,1);`;

    // Randomize starting position from different edges/corners of the board
    const boardZoneRect = boardZone.getBoundingClientRect();
    const boardCenterX = boardZoneRect.left + boardZoneRect.width / 2;
    const boardCenterY = boardZoneRect.top + boardZoneRect.height / 2;
    const edgeOffset = 120;

    const edges = ['left', 'right', 'top', 'bottom', 'top-left', 'top-right', 'bottom-left', 'bottom-right'];
    const randomEdge = edges[Math.floor(Math.random() * edges.length)];
    let startX = boardCenterX;
    let startY = boardCenterY;

    switch(randomEdge) {
      case 'left': startX = boardZoneRect.left - edgeOffset; break;
      case 'right': startX = boardZoneRect.right + edgeOffset; break;
      case 'top': startY = boardZoneRect.top - edgeOffset; break;
      case 'bottom': startY = boardZoneRect.bottom + edgeOffset; break;
      case 'top-left': startX = boardZoneRect.left - edgeOffset; startY = boardZoneRect.top - edgeOffset; break;
      case 'top-right': startX = boardZoneRect.right + edgeOffset; startY = boardZoneRect.top - edgeOffset; break;
      case 'bottom-left': startX = boardZoneRect.left - edgeOffset; startY = boardZoneRect.bottom + edgeOffset; break;
      case 'bottom-right': startX = boardZoneRect.right + edgeOffset; startY = boardZoneRect.bottom + edgeOffset; break;
    }

    objEl.style.left = startX + 'px';
    objEl.style.top = startY + 'px';
    objEl.textContent = icon;
    document.body.appendChild(objEl);
    await sleep(50);

    // Randomized spin: 3–6 rotations, 1.6–2.8s duration, random direction
    const spinRotations = 3 + Math.floor(Math.random() * 4); // 3-6
    const spinDirection = Math.random() < 0.5 ? 1 : -1;
    const spinDuration = 1600 + Math.random() * 1200; // 1.6-2.8s
    const spinAmount = spinRotations * 360 * spinDirection;

    objEl.style.setProperty('--spin-amount', spinAmount + 'deg');
    objEl.style.setProperty('--spin-duration', spinDuration + 'ms');

    objEl.style.left = '50%';
    objEl.style.top = '40%';
    objEl.style.transform = `translate(-50%, -50%) scale(1.5)`;
    objEl.style.filter = 'drop-shadow(0 0 20px gold)';
    objEl.classList.add('goal-spin');

    await sleep(Math.max(spinDuration, 1150) + 200); // 800 + 50 + spin duration = ~2500-3000ms total

    if (skipWinSequence) { clearTimeout(confettiStopTimer); return showResult(); }

    // Fade out icon
    objEl.style.transition = 'opacity 0.45s';
    objEl.style.opacity = '0';
    // Flag overlay is already at 0 opacity (set at start of celebration)
    setTimeout(() => { objEl.remove(); }, 500);

    // Step 3: Fade in portrait at 2-3 seconds from start of sequence
    // This happens while flag is visible, creating the effect of portrait briefly disappearing
    const portrait = document.querySelector('.portrait');
    if (portrait) {
      portrait.style.transition = 'opacity 0.6s ease';
      portrait.style.opacity = '1';
    }
    // Tiles are already animating from start of celebration (0s)
    // Wait ~2-3 seconds before appending name tag at 4-5 second mark
    // The portrait now fades in during this wait, overlaying the flag background
    await sleep(1000);

    if (skipWinSequence) { clearTimeout(confettiStopTimer); return showResult(); }

    // Confetti already stopped at 3s mark, now show the name tag with trivia
    nameTag.style.animation = 'toast-in 0.5s ease, fadeout 3s ease 3.5s forwards';
    boardZone && boardZone.appendChild(nameTag);

    // Wait while name tag is visible and fading (~7-8 seconds total from goal scored)
    await sleep(6000);

    if (skipWinSequence) { clearTimeout(confettiStopTimer); return showResult(); }

    // Step 5: Fade portrait to black
    const blackOverlay = document.createElement('div');
    blackOverlay.style.cssText = `position:absolute;inset:0;z-index:50;background:rgba(0,0,0,0.9);animation:blackfade 1s ease forwards;pointer-events:none;`;
    boardZone && boardZone.appendChild(blackOverlay);

    await sleep(1500);

    clearTimeout(confettiStopTimer);
    return showResult();
  }

  window.buyBundle = async function(size) {
    if (state.walletBalance === undefined || state.walletBalance === null) {
      showToast('Wallet not initialized — please reload', 3000);
      return;
    }
    const tok = getToken();
    let url = `/api/games/${state.game.id}/bundle`;
    if (tok) {
      const sep = url.includes('?') ? '&' : '?';
      url = url + sep + 'token=' + encodeURIComponent(tok);
    }
    const opts = {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        ...(tok ? { 'x-usernode-token': tok } : {}),
        'x-testing-mode': testingModeActive ? 'true' : 'false'
      },
      body: JSON.stringify({ bundle_size: size })
    };
    const r = await fetch(url, opts);
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      if (r.status === 402 || e.error === 'Insufficient balance') {
        showToast('Not enough tokens — try a smaller bundle below 👇', 3000);
      } else {
        showToast(e.error || 'Bundle purchase failed');
      }
      return;
    }
    const d = await r.json();
    state.credits = { id: d.session.id, credits_remaining: d.credits_remaining, tokens_per_credit: d.session.tokens_per_credit };
    state.walletBalance = d.wallet_balance;
    updateHud();
    updateCreditsDisplay();
    showToast(t('game.shots_loaded', {size: size}), 2000);
  };
