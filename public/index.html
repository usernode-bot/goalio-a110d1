  // ═══════════════════════════════════════════════════════════════
  // ROUTING
  // ═══════════════════════════════════════════════════════════════
  function navigate(hash) { location.hash = hash; }
  function route() {
    clearPolls();
    stopConfetti();
    const flagBgEl = document.getElementById('flag-bg');
    if (flagBgEl) flagBgEl.style.backgroundImage = '';
    document.documentElement.style.removeProperty('--accent');
    document.documentElement.style.removeProperty('--accent-soft');
    const hash = location.hash || '#lobby';
    if (hash === '#lobby' || hash === '#') renderLobby();
    else if (hash.startsWith('#game/')) renderGame(hash.replace('#game/', ''));
    else if (hash === '#league') renderLeague();
    else if (hash === '#faq') renderFaq();
    else renderLobby();
  }
  window.addEventListener('hashchange', route);

  // ═══════════════════════════════════════════════════════════════
  // LOBBY
  // ═══════════════════════════════════════════════════════════════
  async function renderLobby() {
    const app = document.getElementById('app');
    app.innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;">
      ${renderHeader()}
      <div id="lobby-body" style="flex:1;max-width:480px;margin:0 auto;padding:12px 16px 20px;width:100%;">
        <div style="text-align:center;padding:40px 0;color:#555;">Loading...</div>
      </div>
    </div>`;
    await loadLobby();
  }

  async function loadLobby() {
    const body = document.getElementById('lobby-body');
    function showLobbyError(msg, isAuth) {
      console.error('Lobby error:', msg);
      const tokenDebug = isAuth ? (() => {
        const tok = getToken();
        const hasSS = (() => { try { return !!sessionStorage.getItem('usernode_token'); } catch(_) { return false; } })();
        const hasLS = (() => { try { return !!localStorage.getItem('usernode_token'); } catch(_) { return false; } })();
        return `<p style="margin-top:12px;font-size:0.7rem;font-family:monospace;color:#71717a;">
          token in memory: ${tok ? '✓' : '✗'} &nbsp;|&nbsp;
          sessionStorage: ${hasSS ? '✓' : '✗'} &nbsp;|&nbsp;
          localStorage: ${hasLS ? '✓' : '✗'}
        </p>
        <p style="margin-top:8px;font-size:0.75rem;color:#a1a1aa;font-family:'DM Sans',sans-serif;">Sign in via Usernode to play.</p>`;
      })() : '';
      if (body) body.innerHTML = `<div style="text-align:center;padding:40px;font-family:'DM Sans',sans-serif;">
        <p style="color:#f87171;">Error loading lobby: ${msg}</p>${tokenDebug}
      </div>`;
    }
    try {
      const sessionRes = await api('GET', '/api/session');
      if (!sessionRes.ok) {
        let detail = 'HTTP ' + sessionRes.status;
        try { const e = await sessionRes.json(); if (e && e.error) detail += ' — ' + e.error; } catch(_) {}
        showLobbyError(detail, sessionRes.status === 401);
        return;
      }
      const data = await sessionRes.json();
      const session = data.session;
      const captain_pot_balance = data.captain_pot_balance;
      const wallet_balance = data.wallet_balance;
      const next_opponent_theme = data.next_opponent_theme;
      state.session = session;
      state.next_opponent_theme = next_opponent_theme;
      state.walletBalance = wallet_balance || 1000;
      state.potBalance = captain_pot_balance || 100;
      state.prevPotBalance = state.potBalance;
      // Seed the last-won marker from the server so the first poll doesn't
      // mistake a pre-existing win for a fresh one (phantom broadcast).
      if (data.last_won_at) state.potLastWonAt = data.last_won_at;

      renderLobbyBody(session);
      setupLobbyPolls();
    } catch(e) {
      showLobbyError(e && e.message ? e.message : String(e));
    }
  }

  function renderLobbyBody(session) {
    const body = document.getElementById('lobby-body');
    if (!body) return;
    const hasActiveSession = session && !session.session_complete && session.current_game_id;
    if (hasActiveSession) {
      // Resume — drop straight back into the active match
      navigate('#game/' + session.current_game_id);
      return;
    }

    const statsRow = `
      <div class="lobby-stats-row" style="display:flex;align-items:stretch;gap:10px;margin-bottom:14px;">
        <div class="lobby-stat-box" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:6px 12px;font-family:'DM Sans',sans-serif;cursor:pointer;" onclick="openInfoPanel()" title="How GOAL! works">
          <span style="font-size:0.7rem;color:#888;">Guide</span>
          <span class="val" style="font-family:'DM Sans',sans-serif;font-size:0.9rem;color:#f0f0f5;font-weight:700;display:block;">How it works ⓘ</span>
        </div>
        ${(() => {
          const heartbeat = state.potBalance > 500 ? ' pot-heartbeat' : '';
          return `<div class="lobby-stat-box hud-chip pot-chip${heartbeat}" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
            <span style="color:#888;font-size:0.7rem;">Captain's Pot</span>
            <span class="val pot-chip-value" style="font-family:'Space Mono',monospace;font-size:1rem;color:#fbbf24;font-weight:700;display:block;">${Math.round(state.potBalance).toLocaleString()} t</span>
          </div>`;
        })()}
        <div class="lobby-stat-box hud-chip" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
          <span style="font-size:0.7rem;color:#888;">Wallet</span>
          <span class="val" style="font-family:'Space Mono',monospace;font-size:1rem;color:#f0f0f5;font-weight:700;display:block;">${Math.round(state.walletBalance)} t</span>
        </div>
      </div>`;

    const inProgress = session && !session.session_complete;

    let mainSection;
    if (inProgress) {
      // Tournament underway, no active match — auto-match resume state
      const myTeam = state.themes.find(t => t.slug === session.my_team_slug);
      const hasOpponent = state.next_opponent_theme && state.next_opponent_theme.slug;
      const palette = session.stage_idx >= 3 ? KNOCKOUT_PALETTES[session.stage_idx] : null;
      const cardBg = palette ? palette.cardDeep : 'rgba(255,255,255,0.04)';
      const cardBorder = palette ? palette.accent : 'rgba(255,255,255,0.08)';
      const accentColor = palette ? palette.accent : '#fbbf24';
      const buttonGradient = palette ? `linear-gradient(135deg, ${palette.accent} 0%, ${palette.accent2} 100%)` : `linear-gradient(135deg, #ffce4a, #f59e0b)`;
      const badgeBg = palette ? palette.accent : '#fbbf24';
      mainSection = `
        <p class="hero-sub" style="margin-bottom:14px;">You're mid-tournament — knock out the next nation to advance.</p>
        <div style="display:flex;flex-direction:column;gap:12px;padding:16px;background:${cardBg};border:1px solid ${cardBorder};border-radius:14px;">
          <div style="text-align:center;margin-bottom:8px;">
            <div style="display:inline-block;background:${badgeBg};color:${palette ? (palette === KNOCKOUT_PALETTES[6] ? '#1a1423' : '#0a0a0f') : '#0a0a0f'};font-family:'DM Sans',sans-serif;font-size:0.75rem;font-weight:700;padding:4px 10px;border-radius:6px;text-transform:uppercase;letter-spacing:0.08em;">${stageName(session.stage_idx)}</div>
            <div style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:#9ca3af;text-transform:uppercase;letter-spacing:0.08em;margin-top:6px;">Stage ${session.stage_idx + 1}/7</div>
          </div>
          <div style="display:flex;align-items:flex-start;justify-content:center;gap:14px;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;">
              ${FLAG_SVGS[session.my_team_slug] ? `<img src="${FLAG_SVGS[session.my_team_slug]}" alt="${myTeam ? myTeam.country_name : session.my_team_slug}" style="width:48px;height:32px;border-radius:4px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.4);">` : `<div style="width:48px;height:32px;border-radius:4px;background:${flagGradient(myTeam ? myTeam.accent_colour : '#444')};box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`}
              <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:1rem;text-align:center;">${myTeam ? myTeam.country_name : session.my_team_slug} <span style="font-weight:600;color:#9ca3af;font-size:0.9rem;">(you)</span></div>
            </div>
            ${hasOpponent ? `
              <div style="font-family:'DM Sans',sans-serif;font-weight:600;color:${accentColor};align-self:center;flex-shrink:0;">vs</div>
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;">
                ${FLAG_SVGS[state.next_opponent_theme.slug] ? `<img src="${FLAG_SVGS[state.next_opponent_theme.slug]}" alt="${state.next_opponent_theme.country_name}" style="width:48px;height:32px;border-radius:4px;object-fit:cover;box-shadow:0 2px 8px rgba(0,0,0,0.4);">` : `<div style="width:48px;height:32px;border-radius:4px;background:${flagGradient(state.next_opponent_theme.accent_colour)};box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`}
                <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:1rem;text-align:center;">${state.next_opponent_theme.country_name}</div>
              </div>
            ` : ''}
          </div>
          <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-top:4px;">
            <button onclick="startNewMap()" class="bundle-btn" style="background:${buttonGradient};color:#0a0a0f;box-shadow:0 2px 12px ${palette ? palette.accent + '44' : 'rgba(251,191,36,0.28)'};font-weight:700;">Start Next Match ▶</button>
          </div>
        </div>`;
    } else {
      // No tournament (or just completed) — flag-forward nation picker
      mainSection = `
        <h2 class="section-title" style="margin-bottom:4px;">Choose your nation</h2>
        <p class="hero-sub" style="margin-bottom:14px;">${session && session.session_complete ? '🏆 Champions! Pick a nation to start a fresh tournament.' : 'Win seven matches — three group games, then the knockouts — to lift the cup.'}</p>
        <div class="nation-picker" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;">
          ${state.themes.map(t => `
            <div class="nation-card" onclick="pickNation('${t.slug}')">
              <div class="flag-area">${flagImg(t.slug, t.country_name, '', '') || `<div style="position:absolute;inset:0;background:${flagGradient(t.accent_colour)};"></div>`}</div>
              <div class="name-area">${t.country_name}</div>
            </div>
          `).join('')}
        </div>`;
    }

    body.innerHTML = `
      ${statsRow}
      ${mainSection}
      `;

    maybeAutoShowInfo();
  }

  // ── Home-page info panel ───────────────────────────────────────────────────
  // Minimal pop-up: just the basics, always dismissible. The header (title + ×)
  // and "Got it" button stay fixed; only the short body scrolls if a tiny
  // viewport ever needs it, so the close controls can never be pushed off-screen.
  function infoPanelHtml() {
    return `<div class="modal-box" style="text-align:left;max-width:360px;max-height:85vh;display:flex;flex-direction:column;padding:18px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex:0 0 auto;">
        <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:1.1rem;color:#fbbf24;">How GOAL! works</div>
        <button onclick="dismissInfoPanel(this.closest('.modal-bg'))" aria-label="Close" style="background:none;border:none;color:#aaa;font-size:1.6rem;cursor:pointer;line-height:1;padding:0 6px;">×</button>
      </div>
      <ul style="padding-left:18px;margin:0 0 14px;font-family:'DM Sans',sans-serif;font-size:0.85rem;color:#cfcfe0;line-height:1.5;flex:1 1 auto;overflow-y:auto;min-height:0;">
        <li style="margin-bottom:8px;"><strong>The board grows each stage</strong> — small in the group games, bigger in the knockouts, biggest in the final.</li>
        <li style="margin-bottom:8px;"><strong>Shot price changes by stage</strong> so a typical board costs about the same throughout.</li>
        <li><strong>The Captain's Pot</strong> jackpot grows as you advance — win it by finding the ball on your very first shot.</li>
      </ul>
      <button class="bundle-btn btn-gold" style="width:100%;flex:0 0 auto;" onclick="dismissInfoPanel(this.closest('.modal-bg'))">Got it</button>
      <div style="text-align:center;margin-top:8px;flex:0 0 auto;"><a href="#faq" onclick="dismissInfoPanel(document.getElementById('info-panel'))" style="font-family:'DM Sans',sans-serif;font-size:0.75rem;color:#9ca3af;text-decoration:underline;">Full details in the FAQ</a></div>
    </div>`;
  }
  function showInfoPanel() {
    if (document.getElementById('info-panel')) return;
    const modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.id = 'info-panel';
    modal.innerHTML = infoPanelHtml();
    document.body.appendChild(modal);
  }
  window.openInfoPanel = function() { showInfoPanel(); };
  window.dismissInfoPanel = function(modal) {
    try { localStorage.setItem('goal_info_seen', '1'); } catch(_) {}
    if (modal) modal.remove();
    else { const m = document.getElementById('info-panel'); if (m) m.remove(); }
  };
  function maybeAutoShowInfo() {
    let seen = false;
    try { seen = localStorage.getItem('goal_info_seen') === '1'; } catch(_) {}
    if (!seen) showInfoPanel();
  }

  function setupLobbyPolls() {
    state.polls.push(setInterval(async () => {
      try {
        const r = await api('GET', '/api/captain-pot');
        if (!r.ok) return;
        const d = await r.json();
        updatePotChips(d.balance, d.last_won_at, d.last_winner_username);
      } catch {}
    }, 5000));
    state.polls.push(setInterval(pollLeagueForToast, 3000));
  }

  window.pickNation = async function(slug) {
    const r = await api('POST', '/api/session', { my_team_slug: slug });
    if (!r.ok) { const e = await r.json().catch(()=>({})); showToast(e.error || 'Error creating session'); return; }
    const { session } = await r.json();
    state.session = session;
    // Start first map automatically
    startNewMap();
  };

  async function doStartNewMap() {
    const r = await api('POST', '/api/session/start-map');
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      showToast(e.error || 'Error starting map');
      return;
    }
    const d = await r.json();
    state.session = d.session;
    navigate('#game/' + d.game.id);
  }

  window.startNewMap = async function() {
    if (!state.session) { showToast('Pick a nation first'); return; }
    const r = await api('GET', '/api/session');
    if (!r.ok) {
      showToast('Error loading session. Please try again.');
      return;
    }
    const d = await r.json();
    state.session = d.session;
    state.next_opponent_theme = d.next_opponent_theme;
    if (!state.session) { showToast('Pick a nation first'); return; }
    doStartNewMap();
  };

  function showPotTopupPopup(stageIdx, amount) {
    const tierLabel = stageName(stageIdx);
    const modal = document.createElement('div');
    modal.className = 'modal-bg';
    modal.innerHTML = `<div class="modal-box" style="text-align:center;">
      <div style="font-size:2.2rem;margin-bottom:6px;">⚡</div>
      <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:1.15rem;color:#fbbf24;margin-bottom:8px;line-height:1.25;">${amount} tokens now added to the Captain's Pot</div>
      <p style="font-size:0.85rem;color:#aaa;margin-bottom:10px;font-family:'DM Sans',sans-serif;">You're entering the ${tierLabel}. The board grows and the odds get longer — so the jackpot grows with it.</p>
      <div style="font-family:'Space Mono',monospace;color:#fff;font-size:0.9rem;margin-bottom:18px;">Captain's Pot now ${Math.round(state.potBalance).toLocaleString()} t</div>
      <button class="bundle-btn btn-gold" style="width:100%;" onclick="confirmStartMatch(this.closest('.modal-bg'))">Start ${tierLabel} ▶</button>
    </div>`;
    document.body.appendChild(modal);
  }
  window.confirmStartMatch = function(modal) {
    if (modal) modal.remove();
    doStartNewMap();
  };

  window.joinMap = async function(id) {
    if (!state.session) { showToast('Pick a nation first to join a map'); return; }
    const r = await api('POST', `/api/games/${id}/join`);
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      showToast(e.error || 'Map no longer available');
      return;
    }
    const d = await r.json();
    state.session = d.session;
    navigate('#game/' + id);
  };

  // ═══════════════════════════════════════════════════════════════
  // GAME BOARD
  // ═══════════════════════════════════════════════════════════════
  async function renderGame(id) {
    const app = document.getElementById('app');
    app.innerHTML = `<div class="game-screen">
      ${renderHeader()}
      <div id="game-body" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:2;">
        <div style="text-align:center;padding:40px;color:#555;">Loading game...</div>
      </div>
    </div>`;
    await loadGame(id);
  }

  async function loadGame(id) {
    try {
      const r = await api('GET', `/api/games/${id}`);
      if (!r.ok) { navigate('#lobby'); return; }
      const d = await r.json();
      state.game = d.game;
      state.gameTheme = { slug: d.game.slug, country_name: d.game.country_name, accent_colour: d.game.accent_colour, footballer_name: d.game.footballer_name };
      state.credits = d.credits;
      state.walletBalance = d.wallet_balance;
      state.potBalance = d.captain_pot_balance;
      state.prevPotBalance = d.captain_pot_balance;
      state.squaresRevealed = d.squares_revealed;
      state.prizePot = d.prize_pot;
      state.gridSize = d.grid_size || gridSizeForStage(d.game.stage_idx);
      state.gridCols = d.grid_cols || gridColsForStage(d.game.stage_idx);
      if (d.pricing) state.pricing = d.pricing;

      // If game is completed, go back to lobby
      if (d.game.status === 'completed') { navigate('#lobby'); return; }

      renderGameBody();
      setupGamePolls(id);
      startKeepalive(id);
    } catch(e) {
      console.error('Game load error', e);
    }
  }

  function renderGameBody() {
    const game = state.game;
    const theme = state.gameTheme;

    // Set full-window flag background (opponent theme image) + CSS accent vars
    const flagBgEl = document.getElementById('flag-bg');
    if (flagBgEl) {
      flagBgEl.style.backgroundImage = `url('/images/themes/${theme.slug}.png'), ${flagGradient(theme.accent_colour)}`;
    }
    document.documentElement.style.setProperty('--accent', theme.accent_colour);
    document.documentElement.style.setProperty('--accent-soft', hexToRgba(theme.accent_colour, 0.33));

    const myTeam = state.themes.find(t => t.slug === (state.session ? state.session.my_team_slug : ''));
    const stageIdx = state.session ? state.session.stage_idx : game.stage_idx;

    // Portrait behind tiles — footballer image or trophy for final
    const portraitUrl = stageIdx >= 6
      ? '/images/trophy-reveal.jpg'
      : `/images/footballers/${theme.slug}.png`;

    const hud = `<div class="game-hud">
      <div class="hud-chip"><span style="display:block;">Wallet</span><span class="val wallet-val">${Math.round(state.walletBalance)} t</span></div>
      <div class="hud-chip"><span style="display:block;">Prize Pot</span><span class="val prize-val" style="color:#fbbf24;">${state.prizePot} t</span></div>
      ${potChipHtml(state.potBalance)}
      <div class="hud-chip"><span style="display:block;">Shots</span><span class="val shots-val">${state.squaresRevealed}</span></div>
    </div>`;

    const myFlag = myTeam ? (FLAG_SVGS[myTeam.slug] ? `<img class="flag-mini" src="${FLAG_SVGS[myTeam.slug]}" alt="${myTeam.country_name}">` : `<div class="flag-mini" style="background:${flagGradient(myTeam.accent_colour)};"></div>`) : '';
    const oppFlag = FLAG_SVGS[theme.slug] ? `<img class="flag-mini" src="${FLAG_SVGS[theme.slug]}" alt="${theme.country_name}">` : `<div class="flag-mini" style="background:${flagGradient(theme.accent_colour)};"></div>`;
    const nationStrip = `<div class="nation-strip">
      ${myFlag}<span style="font-weight:700;color:#f0f0f5;">${myTeam ? myTeam.country_name : 'You'} <span style="color:#fbbf24;font-weight:600;">(you)</span></span>
      <span style="color:#fbbf24;font-weight:900;font-size:0.8rem;margin:0 4px;text-shadow:0 0 8px rgba(251,191,36,0.6);letter-spacing:0.05em;">v</span>
      ${oppFlag}<span style="font-weight:700;color:#f0f0f5;">${theme.country_name}</span>
      <span style="margin-left:auto;background:rgba(0,0,0,0.55);border:1px solid rgba(251,191,36,0.5);border-radius:5px;padding:1px 7px;color:#fbbf24;font-size:0.6rem;font-family:'Space Mono',monospace;white-space:nowrap;text-transform:uppercase;letter-spacing:0.06em;box-shadow:0 0 6px rgba(251,191,36,0.2);">${stageName(stageIdx)}</span>
    </div>`;

    // Build tiles for this stage's grid; open tiles show portrait beneath
    const gridSize = state.gridSize || gridSizeForStage(stageIdx);
    const gridCols = state.gridCols || gridColsForStage(stageIdx);
    const revealed = game.revealed || new Array(gridSize).fill(false);
    let tiles = '';
    for (let i = 0; i < gridSize; i++) {
      const isOpen = revealed[i];
      tiles += `<div class="tile${isOpen ? ' open' : ''}" data-idx="${i}" onclick="${isOpen ? '' : `onCellClick(${i})`}"></div>`;
    }

    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    let controls = '';
    if (credRemaining > 0) {
      controls = `<div class="credits-chip">🎯 ${credRemaining} shot${credRemaining !== 1 ? 's' : ''} remaining</div>`;
    } else {
      controls = shotButtonsHtml();
    }

    const initialHint = `${stageName(stageIdx)} — find the ball to knock out ${theme.country_name}`;

    document.getElementById('game-body').innerHTML = `
      ${hud}
      ${nationStrip}
      <div class="board-zone" id="board-zone">
        <div class="board-wrap">
          <div class="portrait" style="background-image:url('${portraitUrl}')"></div>
          <div class="board game-grid" id="game-grid" style="grid-template-columns:repeat(${gridCols},1fr);">
            ${tiles}
          </div>
          <div class="reveal" id="board-reveal"></div>
        </div>
      </div>
      <div class="game-footer">
        <div id="controls-row" style="margin-bottom:2px;">${controls}</div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:1px 0;">
          <div id="hint-bar" class="font-dm" style="font-size:10px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;">${initialHint}</div>
          <span class="font-dm" style="font-size:10px;color:#3a3a50;cursor:pointer;text-decoration:underline;flex-shrink:0;margin-left:8px;" onclick="leaveMap(${game.id})">Leave Map</span>
        </div>
      </div>`;

    // Match-start animation: fade in tiles sequentially with sparkle
    // First, hide portrait initially
    const portraitEl = document.querySelector('.portrait');
    if (portraitEl) {
      portraitEl.style.opacity = '0';
    }

    // Apply random fade-in animation to tiles (spread over ~2.5 seconds with sparkles)
    const tiles_list = document.querySelectorAll('.tile');
    tiles_list.forEach((tile) => {
      tile.classList.add('tile-spawn');
      // Random delay between 0 and 2000ms so tiles appear randomly throughout 2.5s window
      // (accounting for 0.4s spawn animation, tiles finish by 2.4s total)
      tile.style.animationDelay = (Math.random() * 2000) + 'ms';
    });

    // After all tiles finish animating, apply full-board sparkle flash
    setTimeout(() => {
      tiles_list.forEach((tile) => {
        tile.classList.add('tile-sparkle-flash');
      });
    }, 2500);

    // After all tiles finish animating and sparkle flash, fade in the portrait
    setTimeout(() => {
      if (portraitEl) {
        portraitEl.style.transition = 'opacity 0.5s ease';
        portraitEl.style.opacity = '1';
      }
    }, 3000);
  }

  function updateHud() {
    const wv = document.querySelector('.wallet-val'); if (wv) wv.textContent = Math.round(state.walletBalance) + ' t';
    const pv = document.querySelector('.prize-val'); if (pv) pv.textContent = prizeDecay(state.squaresRevealed, state.gridSize) + ' t';
    const sv = document.querySelector('.shots-val'); if (sv) sv.textContent = state.squaresRevealed;
  }

  function updateCreditsDisplay() {
    const row = document.getElementById('controls-row');
    if (!row) return;
    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    if (credRemaining > 0) {
      row.innerHTML = `<div class="credits-chip">🎯 ${credRemaining} shot${credRemaining !== 1 ? 's' : ''} remaining</div>`;
    } else {
      row.innerHTML = shotButtonsHtml();
    }
  }

  window.onCellClick = async function(idx) {
    const game = state.game;
    if (!game || game.status !== 'active') return;
    if ((game.revealed || [])[idx]) return;

    const credRemaining = state.credits ? parseInt(state.credits.credits_remaining) : 0;
    const sessId = (credRemaining > 0 && state.credits) ? state.credits.id : null;

    if (!sessId) {
      const p = state.pricing || { bundle2: 11, bundle8: 44, bundle16: 88 };
      const modal = document.createElement('div');
      modal.className = 'modal-bg';
      modal.innerHTML = `<div class="modal-box">
        <div style="font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:12px;">Out of Shots</div>
        <p style="font-size:0.85rem;color:#ccc;margin-bottom:16px;font-family:'DM Sans',sans-serif;">You've used all your shots. Top up to keep playing!</p>
        <div style="display:flex;gap:10px;flex-direction:column;">
          <button class="bundle-btn btn-gold" style="width:100%;" onclick="const m = this.closest('.modal-bg'); m.remove(); buyBundle(2).then(() => {});">🎯 Buy 2 Shots</button>
          <button class="bundle-btn btn-gold" style="width:100%;" onclick="const m = this.closest('.modal-bg'); m.remove(); buyBundle(8).then(() => {});">⚡ Buy 8 Shots</button>
          <button class="bundle-btn btn-gold" style="width:100%;" onclick="const m = this.closest('.modal-bg'); m.remove(); buyBundle(16).then(() => {});">⭐ Buy 16 Shots</button>
          <button class="bundle-btn btn-ghost" style="width:100%;" onclick="this.closest('.modal-bg').remove()">Close</button>
        </div>
      </div>`;
      document.body.appendChild(modal);
      return;
    }
    playBlip();

    const body = { square_index: idx };
    if (sessId) body.session_id = sessId;

    // Disable board during request
    document.querySelectorAll('.tile:not(.open)').forEach(c => c.style.pointerEvents = 'none');

    try {
      const r = await api('POST', `/api/games/${game.id}/guess`, body);
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        showToast(e.error || 'Guess failed');
        document.querySelectorAll('.tile').forEach(c => c.style.pointerEvents = '');
        return;
      }
      const d = await r.json();

      // Update state
      if (!game.revealed) game.revealed = new Array(state.gridSize || 36).fill(false);
      game.revealed[idx] = true;
      state.squaresRevealed = d.squares_revealed;
      state.walletBalance = d.wallet_balance;
      state.prizePot = prizeDecay(state.squaresRevealed, state.gridSize);
      if (state.credits && sessId && state.credits.credits_remaining !== undefined) {
        const currentRemaining = parseInt(state.credits.credits_remaining) || 0;
        if (currentRemaining > 0) {
          state.credits.credits_remaining = currentRemaining - 1;
        }
      }

      // If THIS player just won the jackpot, record their win timestamp so the
      // broadcast toast (meant for everyone else) is suppressed for them when
      // polling resumes after the celebration.
      if (d.jackpot_paid > 0 && d.last_won_at) state.potLastWonAt = d.last_won_at;
      updatePotChips(d.pot_balance, null);
      updateHud();
      updateCreditsDisplay();

      const cell = document.querySelector(`.tile[data-idx="${idx}"]`);
      if (d.hit) {
        await runWinSequence(cell, idx, d);
      } else {
        // Miss — rotate reveal variant + optionally double speed
        if (cell) {
          const variant = REVEAL_VARIANTS[state.revealVariantIdx % REVEAL_VARIANTS.length];
          state.revealVariantIdx++;
          const isFast = Math.random() < 0.33;
          const baseDuration = variant === 'flip-miss' ? 0.62 : variant === 'dissolving' ? 0.42 : 0.62;
          const actualDuration = isFast ? baseDuration * 0.5 : baseDuration;
          cell.classList.add(variant);
          if (isFast) cell.classList.add('reveal-fast');
          const cleanupTime = Math.round(actualDuration * 1000);
          setTimeout(() => { cell.classList.add('open'); cell.classList.remove(variant); if (isFast) cell.classList.remove('reveal-fast'); cell.style.pointerEvents = 'none'; }, cleanupTime);
        }
        // Update hint bar
        const hint = document.getElementById('hint-bar');
        if (hint) hint.textContent = QUIPS[Math.floor(Math.random() * QUIPS.length)];
        document.querySelectorAll('.tile:not(.open)').forEach(c => c.style.pointerEvents = '');
      }
    } catch(e) {
      console.error('Guess error', e);
      document.querySelectorAll('.tile').forEach(c => c.style.pointerEvents = '');
    }
  };

  // ═══════════════════════════════════════════════════════════════
  // WIN SEQUENCE
  // ═══════════════════════════════════════════════════════════════
  async function runWinSequence(hitCell, idx, result) {
    clearPolls();
    playVictoryJingle();
    const isFinal = (state.session && state.session.stage_idx >= 6) || result.interstitial === 'final_win';
    const theme = state.gameTheme;
    const stageIdx = state.session ? state.session.stage_idx : state.game.stage_idx;

    // Skip flag to allow touch/click to skip to result card
    let skipWinSequence = false;
    const skipHandler = () => { skipWinSequence = true; };
    const boardZone = document.getElementById('board-zone');
    boardZone && boardZone.addEventListener('click', skipHandler);
    boardZone && boardZone.addEventListener('touchstart', skipHandler);

    // Helper to show result card and clean up
    const showResult = async () => {
      boardZone && boardZone.removeEventListener('click', skipHandler);
      boardZone && boardZone.removeEventListener('touchstart', skipHandler);
      stopConfetti();
      document.querySelectorAll('.tile').forEach(c => { c.classList.add('open'); });

      let resultTitle = 'You found the net!';
      if (result.jackpot_paid > 0) resultTitle = "Captain's Jackpot!";
      else if (isFinal) resultTitle = 'Champions of the World!';
      else if (stageIdx >= 3) resultTitle = `${theme.country_name} knocked out!`;

      state.pendingResult = result;
      const resultCard = document.createElement('div');
      resultCard.className = 'result-overlay';
      resultCard.style.cssText = `position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);`;
      const icon = isFinal ? '🏆' : '⚽';
      resultCard.innerHTML = `
        <div class="result-card">
          <div style="font-size:2rem;margin-bottom:8px;">${icon}</div>
          <div style="font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:4px;">${resultTitle}</div>
          ${result.jackpot_paid > 0 && !isFinal ? `<div style="font-size:0.85rem;color:#aaa;margin-bottom:4px;">${stageIdx >= 3 ? theme.country_name + ' knocked out!' : 'You found the net!'}</div>` : ''}
          <div style="font-family:'Space Mono',monospace;color:#fbbf24;font-size:1.1rem;margin:12px 0;">+${result.prize_paid} tokens</div>
          ${result.jackpot_paid > 0 ? `<div style="font-family:'Space Mono',monospace;color:#fff;font-size:0.9rem;margin-bottom:4px;">⚡ Captain's Pot: +${Math.round(result.jackpot_paid)} tokens</div>` : ''}
          ${result.pot_topup > 0 ? `<div style="font-family:'DM Sans',sans-serif;color:#fbbf24;font-size:0.82rem;margin:8px 0 4px;line-height:1.3;">⚡ ${result.pot_topup} tokens added to the Captain's Pot — ${stageName(result.new_stage_idx)} odds!</div>` : ''}
          ${result.credits_refunded > 0 ? `<div style="font-size:0.8rem;color:#888;margin-bottom:8px;">Bundle refund: +${result.credits_refunded.toFixed(1)} t</div>` : ''}
          <button class="bundle-btn btn-gold" style="width:100%;margin-top:12px;" onclick="handleInterstitial()">Continue →</button>
        </div>`;
      document.body.appendChild(resultCard);

      if (result.new_stage_idx !== null) {
        if (state.session) state.session.stage_idx = result.new_stage_idx;
      }
    };

    // Step 1: shake hit tile (800ms)
    if (hitCell) hitCell.classList.add('shake');

    // Create banner immediately so it appears with ball animation
    let banner = 'GOAL!';
    if (result.jackpot_paid > 0) banner = 'HOLE IN ONE!';
    else if (isFinal) banner = 'WORLD CHAMPIONS!';
    else if (stageIdx >= 3) banner = 'You won!';

    const bannerEl = document.createElement('div');
    bannerEl.style.cssText = `position:absolute;top:20px;left:0;right:0;text-align:center;z-index:60;animation:toast-in 0.5s ease;`;

    // Pick a random 80s GOAL text treatment
    const goalTreatments = ['goal-neon-flicker', 'goal-marquee', 'goal-stack-pulse'];
    const selectedTreatment = goalTreatments[Math.floor(Math.random() * goalTreatments.length)];

    if (selectedTreatment === 'goal-marquee') {
      bannerEl.innerHTML = `<span class="goal-marquee" style="font-family:'DM Sans',sans-serif;font-size:2rem;font-weight:900;color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,0.7);display:inline-block;">GOAL! GOAL! GOAL!</span>`;
    } else {
      bannerEl.innerHTML = `<span class="${selectedTreatment}" style="font-family:'DM Sans',sans-serif;font-size:2rem;font-weight:900;display:inline-block;text-shadow:0 0 20px rgba(251,191,36,0.7);">${banner}</span>`;
    }
    boardZone && boardZone.appendChild(bannerEl);

    // Create name tag but don't append yet — will show after 5s portrait reveal
    const nameTag = document.createElement('div');
    nameTag.style.cssText = `position:absolute;bottom:12px;left:0;right:0;text-align:center;z-index:60;animation:toast-in 0.5s ease 0s, fadeout 4s ease 6s forwards;padding:0 8px;`;
    const footballerText = isFinal ? 'World Cup Trophy 🏆' : `${theme.footballer_name} — ${theme.country_name}`;
    const fact = !isFinal ? (FOOTBALLER_FACTS[theme.slug] || '') : '';
    const factHtml = fact ? `<div style="font-family:'DM Sans',sans-serif;font-size:0.68rem;font-style:italic;color:#fbbf24;margin-top:4px;line-height:1.35;">${fact}</div>` : '';
    nameTag.innerHTML = `<div style="display:inline-block;max-width:92%;background:rgba(0,0,0,0.84);padding:7px 14px 8px;border-radius:16px;text-align:center;">
      <div style="font-family:'DM Sans',sans-serif;font-size:0.9rem;color:white;font-weight:600;">${footballerText}</div>
      ${factHtml}
    </div>`;

    startConfetti();

    await sleep(800);
    if (skipWinSequence) { return showResult(); }

    // Step 2: dim board and float football/trophy to centre — total 2s from start
    const dim = document.createElement('div');
    dim.className = 'board-dim';
    dim.style.transition = 'opacity 0.45s';
    boardZone && boardZone.appendChild(dim);

    const icon = isFinal ? '🏆' : '⚽';
    const objEl = document.createElement('div');
    objEl.style.cssText = `position:fixed;font-size:80px;z-index:200;pointer-events:none;transition:all 0.6s cubic-bezier(.22,1,.36,1);`;

    // Randomize starting position from different edges/corners of the board
    const boardZoneRect = boardZone.getBoundingClientRect();
    const boardCenterX = boardZoneRect.left + boardZoneRect.width / 2;
    const boardCenterY = boardZoneRect.top + boardZoneRect.height / 2;
    const edgeOffset = 120;

    const edges = ['left', 'right', 'top', 'bottom', 'top-left', 'top-right', 'bottom-left', 'bottom-right'];
    const randomEdge = edges[Math.floor(Math.random() * edges.length)];
    let startX = boardCenterX;
    let startY = boardCenterY;

    switch(randomEdge) {
      case 'left': startX = boardZoneRect.left - edgeOffset; break;
      case 'right': startX = boardZoneRect.right + edgeOffset; break;
      case 'top': startY = boardZoneRect.top - edgeOffset; break;
      case 'bottom': startY = boardZoneRect.bottom + edgeOffset; break;
      case 'top-left': startX = boardZoneRect.left - edgeOffset; startY = boardZoneRect.top - edgeOffset; break;
      case 'top-right': startX = boardZoneRect.right + edgeOffset; startY = boardZoneRect.top - edgeOffset; break;
      case 'bottom-left': startX = boardZoneRect.left - edgeOffset; startY = boardZoneRect.bottom + edgeOffset; break;
      case 'bottom-right': startX = boardZoneRect.right + edgeOffset; startY = boardZoneRect.bottom + edgeOffset; break;
    }

    objEl.style.left = startX + 'px';
    objEl.style.top = startY + 'px';
    objEl.textContent = icon;
    document.body.appendChild(objEl);
    await sleep(50);

    // Randomized spin: 3–6 rotations, 1.6–2.8s duration, random direction
    const spinRotations = 3 + Math.floor(Math.random() * 4); // 3-6
    const spinDirection = Math.random() < 0.5 ? 1 : -1;
    const spinDuration = 1600 + Math.random() * 1200; // 1.6-2.8s
    const spinAmount = spinRotations * 360 * spinDirection;

    objEl.style.setProperty('--spin-amount', spinAmount + 'deg');
    objEl.style.setProperty('--spin-duration', spinDuration + 'ms');

    objEl.style.left = '50%';
    objEl.style.top = '40%';
    objEl.style.transform = `translate(-50%, -50%) scale(1.5)`;
    objEl.style.filter = 'drop-shadow(0 0 20px gold)';
    objEl.classList.add('goal-spin');

    await sleep(Math.max(spinDuration, 1150) + 200); // 800 + 50 + spin duration = ~2500-3000ms total

    if (skipWinSequence) { return showResult(); }

    // Fade out icon and dim, then reveal portrait
    objEl.style.transition = 'opacity 0.45s';
    objEl.style.opacity = '0';
    dim.style.opacity = '0';
    setTimeout(() => { objEl.remove(); dim.remove(); }, 500);

    // Step 3: Fade in portrait and hold for 5 seconds
    const portrait = document.querySelector('.portrait');
    if (portrait) {
      portrait.style.transition = 'opacity 0.6s ease';
      portrait.style.opacity = '1';
    }
    // Hide all tiles by marking them as open so they're transparent
    document.querySelectorAll('.tile').forEach(c => {
      c.classList.add('open');
    });

    // Wait 5 seconds while portrait is visible and unobstructed
    await sleep(5000);

    if (skipWinSequence) { return showResult(); }

    // Now show the name tag with trivia
    boardZone && boardZone.appendChild(nameTag);

    // Wait while name tag is visible and fading (6s visible + 4s fade = 10s total)
    await sleep(10000);

    if (skipWinSequence) { return showResult(); }

    // Step 5: Fade portrait to black
    const blackOverlay = document.createElement('div');
    blackOverlay.style.cssText = `position:absolute;inset:0;z-index:50;background:rgba(0,0,0,0.9);animation:blackfade 1s ease forwards;pointer-events:none;`;
    boardZone && boardZone.appendChild(blackOverlay);

    await sleep(1500);

    return showResult();
  }

  window.handleInterstitial = function() {
    const result = state.pendingResult || {};
    const type = result.interstitial || '';
    document.querySelectorAll('.result-overlay').forEach(e => e.remove());
    stopConfetti();

    if (type === 'final_win') {
      renderVictoryStadium(result);
    } else if (type === 'through_to_knockouts') {
      // Show interstitial then lobby
      const el = document.createElement('div');
      el.className = 'result-overlay';
      el.style.cssText = 'position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);';
      el.innerHTML = `<div class="result-card"><div style="font-size:2rem;">🎉</div>
        <div style="font-family:'DM Sans',sans-serif;font-size:1.3rem;font-weight:700;margin:8px 0;">You're through to the knockouts, congratulations!</div>
        <div style="color:#aaa;font-size:0.85rem;margin-bottom:16px;">All group matches won</div>
        <button class="bundle-btn btn-gold" style="width:100%;" onclick="document.querySelectorAll('.result-overlay').forEach(e=>e.remove());navigate('#lobby');">Continue →</button>
      </div>`;
      document.body.appendChild(el);
    } else {
      navigate('#lobby');
    }
  };

  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ═══════════════════════════════════════════════════════════════
  // BUNDLE PURCHASE
  // ═══════════════════════════════════════════════════════════════
  window.buyBundle = async function(size) {
    const r = await api('POST', `/api/games/${state.game.id}/bundle`, { bundle_size: size });
    if (!r.ok) {
      const e = await r.json().catch(()=>({}));
      if (r.status === 402 || e.error === 'Insufficient balance') {
        showToast('Not enough tokens — try a smaller bundle below 👇', 3000);
      } else {
        showToast(e.error || 'Bundle purchase failed');
      }
      return;
    }
    const d = await r.json();
    state.credits = { id: d.session.id, credits_remaining: d.credits_remaining, tokens_per_credit: d.session.tokens_per_credit };
    state.walletBalance = d.wallet_balance;
    updateHud();
    updateCreditsDisplay();
    showToast(`${size} shots loaded!`, 2000);
  };

  // GAME POLLS & KEEPALIVE
  // ═══════════════════════════════════════════════════════════════
  function setupGamePolls(id) {
    state.polls.push(setInterval(async () => {
      try {
        const r = await api('GET', `/api/games/${id}`);
        if (!r.ok) return;
        const d = await r.json();
        updatePotChips(d.captain_pot_balance, d.last_won_at, d.last_winner_username);
      } catch {}
    }, 5000));
    state.polls.push(setInterval(pollLeagueForToast, 3000));
  }

  function startKeepalive(id) {
    const iv = setInterval(() => api('POST', `/api/games/${id}/keepalive`), 30000);
    state.polls.push(iv);
    window.addEventListener('beforeunload', () => {
      api('POST', `/api/games/${id}/leave`);
    }, { once: true });
  }

  // ═══════════════════════════════════════════════════════════════
  // VICTORY STADIUM

      : '';

    document.getElementById('app').innerHTML = `
      <div id="victory-bg" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 16px;min-height:100vh;overflow:auto;">
        <div class="result-card" style="max-width:400px;width:100%;">
          <div class="font-8bit" style="font-size:0.7rem;color:#fbbf24;margin-bottom:14px;">TOURNAMENT COMPLETE</div>
          <div style="font-family:'DM Sans',sans-serif;font-weight:800;font-size:clamp(1.1rem,5vw,1.5rem);line-height:1.25;color:#fbbf24;text-shadow:0 2px 16px rgba(251,191,36,0.45);text-align:center;margin-bottom:16px;">
            ${playerName} have won the World Cup with ${countryName}! 🏆
          </div>
          <div style="font-family:'Space Mono',monospace;font-size:1.2rem;color:#10b981;margin-bottom:4px;">+${Math.round(totalWon)} tokens total</div>
          ${result.jackpot_paid > 0 ? `<div style="font-family:'Space Mono',monospace;font-size:0.85rem;color:#fbbf24;margin-bottom:4px;">⚡ Captain's Jackpot: +${Math.round(result.jackpot_paid)} t</div>` : ''}
          <div style="font-family:'Space Mono',monospace;font-size:0.85rem;color:#fbbf24;margin-bottom:8px;">🏠 House Bonus: +50 tokens</div>
          <div style="font-size:0.8rem;color:#888;margin-bottom:16px;font-family:'DM Sans',sans-serif;">League rank: #${myRank} · Score: ${Math.round(myScore)} t</div>
          <div style="margin-bottom:8px;">
            <label style="font-family:'DM Sans',sans-serif;font-size:0.82rem;color:#888;display:block;margin-bottom:4px;">League display name</label>
            <input id="display-name-input" value="${displayName || username}" maxlength="32" style="width:100%;padding:8px 12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:white;font-family:'DM Sans',sans-serif;font-size:0.9rem;">
          </div>
          <button class="bundle-btn btn-gold" style="width:100%;margin-bottom:12px;" onclick="submitLeague()">Save Name to League</button>
          <div style="display:flex;gap:8px;">
            <button class="bundle-btn btn-green" style="flex:1;" onclick="showLeaderboardAfterVictory()">🏆 Show Leaderboard</button>
            <button class="bundle-btn btn-ghost" style="flex:1;" onclick="playAgain()">▶ Play Again</button>
          </div>
        </div>
      </div>`;
  }

  window.submitLeague = async function() {
    const dn = document.getElementById('display-name-input');
    if (dn && dn.value.trim()) {
      await api('PATCH', '/api/league/display-name', { display_name: dn.value.trim() });
    }
    showToast('League score saved!', 2000);
  };
  window.skipLeague = function() { showToast('Score recorded', 2000); };
  window.showLeaderboardAfterVictory = async function() {
    const dn = document.getElementById('display-name-input');
    if (dn && dn.value.trim()) {
      await api('PATCH', '/api/league/display-name', { display_name: dn.value.trim() });
    }
    stopConfetti();
    navigate('#league');
  };
  window.playAgain = async function() {
    stopConfetti();
    if (state.session) {
      await api('POST', '/api/session', { my_team_slug: state.session.my_team_slug });
      state.session = null;
    }
    navigate('#lobby');
  };

  // ═══════════════════════════════════════════════════════════════
  // LEAGUE PAGE
  // ═══════════════════════════════════════════════════════════════
  async function renderLeague() {
    const app = document.getElementById('app');
    app.innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;">
      ${renderHeader()}
      ${backToGameBannerHtml()}
      <div style="max-width:480px;margin:0 auto;padding:20px 16px;width:100%;" id="league-body">
        <div style="text-align:center;color:#555;padding:40px;">Loading...</div>
      </div>
    </div>`;
    await loadLeague();
  }

  async function loadLeague() {
    try {
      const r = await api('GET', '/api/league');
      if (!r.ok) { document.getElementById('league-body').innerHTML = '<p style="color:#f87171;text-align:center;padding:40px;">Error loading league</p>'; return; }
      const d = await r.json();
      renderLeagueBody(d);
      setupLeaguePolls(d);
    } catch(e) { console.error(e); }
  }

  function renderLeagueBody(d) {
    const body = document.getElementById('league-body');
    if (!body) return;
    const now = new Date();
    const deadline = new Date('2026-07-19T00:00:00Z');
    const diff = deadline - now;
    const days = Math.floor(diff / 86400000);
    const hrs = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const countdown = diff > 0 ? `${days}d ${hrs}h ${mins}m` : 'Tournament ended';

    const prizeAmt = d.league_prize_tokens || 0;
    const myUserId = null; // can't get from league endpoint without auth

    let rows = d.rankings.map((r, i) => `
      <tr class="${d.current_player && d.current_player.user_id == r.user_id ? 'my-row' : ''}">
        <td class="league-rank">#${i+1}</td>
        <td class="league-name">${r.display_name || r.username}</td>
        <td class="league-score">${Math.round(r.total_tokens_won).toLocaleString()} t</td>
      </tr>`).join('');

    let myRow = '';
    if (d.current_player && d.current_player.rank > 20) {
      myRow = `<tr><td colspan="3" style="padding:4px;border-top:1px solid rgba(255,255,255,0.1);"></td></tr>
        <tr class="my-row"><td class="league-rank">#${d.current_player.rank}</td>
          <td class="league-name">${d.current_player.display_name || d.current_player.username} (you)</td>
          <td class="league-score">${Math.round(d.current_player.total_tokens_won).toLocaleString()} t</td></tr>`;
    }

    body.innerHTML = `
      <div style="background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:16px;margin-bottom:20px;font-family:'DM Sans',sans-serif;">
        <div style="font-size:0.8rem;color:#888;margin-bottom:4px;">League Prize</div>
        <div style="font-size:1rem;line-height:1.5;color:#f0f0f5;">The player leading the League when the World Cup Final whistle blows on <strong>19 July 2026</strong> wins <strong style="color:#fbbf24;font-family:'Space Mono',monospace;">${prizeAmt.toLocaleString()} tokens</strong> — 2% of all tokens ever collected by the game.</div>
        <div style="font-family:'Space Mono',monospace;font-size:0.8rem;color:#888;margin-top:8px;">⏱ ${countdown} remaining</div>
      </div>
      <div style="font-family:'DM Sans',sans-serif;font-weight:700;margin-bottom:12px;">Top 20</div>
      <table class="league-table">
        <thead><tr><th style="text-align:left;">Rank</th><th style="text-align:left;">Player</th><th style="text-align:right;">Score</th></tr></thead>
        <tbody>${rows || '<tr><td colspan="3" style="text-align:center;color:#555;padding:20px;">No scores yet</td></tr>'}${myRow}</tbody>
      </table>`;
  }

  function setupLeaguePolls(initialData) {
    let lastLeader = initialData.current_leader ? initialData.current_leader.user_id : null;
    state.polls.push(setInterval(async () => {
      try {
        const r = await api('GET', '/api/league');
        if (!r.ok) return;
        const d = await r.json();
        const newLeader = d.current_leader;
        if (newLeader && newLeader.user_id !== lastLeader) {
          showToast(`🏆 ${newLeader.display_name || newLeader.username} is now leading the League!`);
          lastLeader = newLeader.user_id;
        }
        renderLeagueBody(d);
      } catch {}
    }, 3500));
  }

  async function pollLeagueForToast() {
    try {
      const r = await api('GET', '/api/league');
      if (!r.ok) return;
      const d = await r.json();
      if (!state.leaderState) { state.leaderState = d.current_leader ? d.current_leader.user_id : null; return; }
      const newLeader = d.current_leader;
      if (newLeader && newLeader.user_id !== state.leaderState) {
        showToast(`🏆 ${newLeader.display_name || newLeader.username} is now leading the League!`);
        state.leaderState = newLeader.user_id;
      }
    } catch {}
  }

  // ═══════════════════════════════════════════════════════════════
  // FAQ PAGE
  // ═══════════════════════════════════════════════════════════════
  function renderFaq() {
    const app = document.getElementById('app');
    app.innerHTML = `<div style="min-height:100vh;display:flex;flex-direction:column;">
      ${renderHeader()}
      ${backToGameBannerHtml()}
      <div style="max-width:480px;margin:0 auto;padding:24px 16px;width:100%;">
        <h1 style="font-family:'DM Sans',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:24px;">How to Play</h1>

        <div class="faq-section">
          <h2>The Game</h2>
          <p>GOAL! World Cup Edition is a 7-stage tournament. Pick your nation, then face 7 opponents across the Group Stage, the Knockouts, the Semi-Final, and the Final.</p>
          <p>The board <strong>grows as you advance</strong>, just like a real World Cup gets harder round by round:</p>
          <ul>
            <li><strong>Group Stage</strong> (Matches 1–3): 4×4 — 16 tiles</li>
            <li><strong>Knockouts</strong> (Round of 16, Quarter-Final): 5×5 — 25 tiles</li>
            <li><strong>Semi-Final</strong>: 6×6 — 36 tiles</li>
            <li><strong>Final</strong>: 7×7 — 49 tiles (find the World Cup Trophy)</li>
          </ul>
          <p>Each tile hides a secret object — a football for stages 1–6, or the Trophy in the Final. Because a small board is found in only a few shots and a big board takes many, the <strong>price per shot is set per stage</strong> so a typical board costs about the same everywhere:</p>
          <ul>
            <li><strong>Group Stage:</strong> 13 t/shot — 8 shots = 104, 16 shots = 208</li>
            <li><strong>Knockouts:</strong> 8 t/shot — 8 shots = 64, 16 shots = 128</li>
            <li><strong>Semi-Final:</strong> 5.5 t/shot — 8 shots = 44, 16 shots = 88</li>
            <li><strong>Final:</strong> 4 t/shot — 8 shots = 32, 16 shots = 64</li>
          </ul>
          <p>Find the hidden object to win the Prize Pot for that board and advance to the next stage. The prize decays as more of the board is revealed — find it early for a bigger reward. Winning all 7 stages earns a 50-token House Bonus.</p>
          <p>The game features 15 nations: France, Brazil, England, Spain, Argentina, Morocco, USA, Turkey, Belgium, Egypt, Portugal, Netherlands, Norway, Germany, Mexico.</p>
        </div>

        <div class="faq-section">
          <h2>The Captain's Pot</h2>
          <p>The Captain's Pot is a global jackpot shared across all boards and all players. Every token spent anywhere — single shot or bundle credit — contributes <strong>20%</strong> to the pot instantly.</p>
          <p><strong>The only way to win it:</strong></p>
          <ul>
            <li>You start a brand-new map (no one has guessed on it yet)</li>
            <li>Your very first shot on that board finds the hidden object</li>
          </ul>
          <p>Both conditions must be true. Joining an existing map (which has prior guesses) makes the jackpot impossible on that board. Missing your first guess on a fresh map also makes it impossible for the rest of that board.</p>
          <p>Because a blind first shot is far easier on a small group board (1 in 16) than in the Final (1 in 49), the pot is <strong>anchored low during the easy group stage and topped up as play reaches harder stages</strong>. Floors: group <strong>100</strong>, knockout <strong>160</strong>, semi <strong>230</strong>, final <strong>320</strong>. Each top-up (+60 into the knockouts, +70 into the semi, +90 into the final) is announced on-screen — the longer the odds, the bigger the top-up.</p>
          <p>You'll see a pop-up with the top-up amount <strong>before you start</strong> the first round of each new tier, so you know how big the jackpot has grown going in. New to the game? Tap <strong>ⓘ How it works</strong> on the home screen for a quick recap any time.</p>
          <p>On a jackpot win: you receive the standard Prize Pot plus the entire Captain's Pot balance. The pot then reseeds to the floor of the stage where it was won, so an easy early win never leaves an inflated pot behind.</p>
        </div>

        <div class="faq-section">
          <h2>The League</h2>
          <p>The League tracks total tokens won across all tournaments, forever. Every prize, jackpot, and house bonus you earn adds to your League score.</p>
          <p>The player leading the League when the World Cup Final whistle blows on <strong>19 July 2026</strong> wins <strong>2% of all tokens ever collected by the game</strong>. The live prize amount is shown at the top of the League page and updates in real time as players spend tokens.</p>
          <p>You set your League display name from the Victory Stadium screen after winning all 7 stages. The League page shows the Top 20 and your own rank, updated every few seconds.</p>
        </div>

        <div class="faq-hackathon">
          <div class="faq-hackathon-badge">🔬 Dev / Hackathon Info — not shown in production</div>
          <h2>Tech &amp; Profitability</h2>

          <h3>Prize Curve</h3>
          <p>The prize is now keyed to the <em>fraction</em> of the board revealed, so it scales identically across every grid size:</p>
          <pre>prize(n, N) = max(8, floor(150 / (1 + e^(10.8 × (n/N − 0.4444)))))</pre>
          <p>where <em>n</em> is the tiles revealed before the winning guess and <em>N</em> is the board size. At N=36 this is exactly the original 0.30×(n−16) curve. Expected prize per board stays ≈ 68–73 tokens at any grid size.</p>
          <p><strong>Key values (fraction of board revealed):</strong></p>
          <table style="border-collapse:collapse;width:100%;font-size:0.8rem;margin-bottom:12px;">
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);"><th style="text-align:left;padding:4px 8px;color:#888;">% revealed</th><th style="text-align:right;padding:4px 8px;color:#888;">Prize (tokens)</th></tr>
            ${[['0%',148],['15%',142],['30%',124],['44%',75],['50%',53],['60%',23],['70%',10],['≥73%',8]].map(([n,p]) => `<tr><td style="padding:4px 8px;color:#ccc;">${n}</td><td style="text-align:right;padding:4px 8px;color:#fbbf24;font-family:'Space Mono',monospace;">${p}</td></tr>`).join('')}
          </table>

          <h3>Per-Stage Pricing &amp; Margin (~12.5%)</h3>
          <p>Price per shot is set per stage so the house keeps ~12.5% (10–15% band) regardless of board size. With the ball uniform on an N-tile board, expected shots = (N+1)/2, and net margin = (revenue − 20% pot − expected prize) / revenue.</p>
          <table style="border-collapse:collapse;width:100%;font-size:0.78rem;margin-bottom:12px;">
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);"><th style="text-align:left;padding:4px 6px;color:#888;">Stage</th><th style="text-align:right;padding:4px 6px;color:#888;">Tiles</th><th style="text-align:right;padding:4px 6px;color:#888;">t/shot</th><th style="text-align:right;padding:4px 6px;color:#888;">Margin</th></tr>
            ${[['Group',16,13,'~14%'],['Knockout',25,8,'~13%'],['Semi',36,5.5,'~13%'],['Final',49,4,'~12%']].map(([s,n,p,m]) => `<tr><td style="padding:4px 6px;color:#ccc;">${s}</td><td style="text-align:right;padding:4px 6px;color:#ccc;">${n}</td><td style="text-align:right;padding:4px 6px;color:#fbbf24;font-family:'Space Mono',monospace;">${p}</td><td style="text-align:right;padding:4px 6px;color:#93c5fd;">${m}</td></tr>`).join('')}
          </table>
          <p>Bundles prepay 8 or 16 shots at the same stage rate (no per-shot discount), so every purchase option holds the same ~12.5% margin.</p>

          <h3>Captain's Pot — Odds-Indexed Floors</h3>
          <p>The pot reseeds to a stage floor F = K·N (K = 6.25): group 100, knockout 160, semi 230, final 320 (rounded up to tidy figures). Expected house jackpot cost per fresh board is F/N ≈ 6.25–6.5 tokens — <strong>roughly constant across every stage</strong>, which is what keeps the long-run margin steady.</p>
          <ul>
            <li>Top-ups derived from the change in odds: +60 entering knockouts, +70 entering the semi, +90 entering the final.</li>
            <li>Jackpot odds per fresh board: group 1/16, knockout 1/25, semi 1/36, final 1/49.</li>
            <li>Reseed on win uses the floor of the winning stage; the pot's anchor tier resets so it can climb again.</li>
          </ul>

          <h3>🔐 ZK Enhancement (Future)</h3>
          <p>Currently players must trust that the hidden object is placed before the game starts and never moved. A Zero-Knowledge proof layer could make this <strong>verifiably fair</strong> without revealing the answer:</p>
          <ul>
            <li>At game creation, the server commits to the ball position using a hash: <code>commit = hash(position, salt)</code>. The commitment is stored publicly (on-chain or in the game record).</li>
            <li>At game end, the server reveals position + salt. Anyone can verify <code>hash(position, salt) == commit</code>, proving the position was fixed from the start.</li>
            <li>A ZK proof goes further: the server can prove it knows a valid pre-image for the commitment <em>without</em> revealing the position mid-game — so the proof is verifiable in real time, not just after the fact.</li>
            <li><strong>Noir</strong> (by Aztec) is a Rust-like language for writing ZK circuits that compile to both native provers and browser-runnable WASM. It would be the natural fit here: write the "ball is at position P under commitment C" circuit in Noir, generate a proof server-side per game, verify client-side in the browser before the player makes their first guess.</li>
          </ul>
          <p>This upgrade would turn the game's fairness from a trust assumption into a cryptographic guarantee — relevant for any real-money deployment.</p>
        </div>
      </div>
    </div>`;
  }

  // ═══════════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════════
  function getQueryParam(name) {
    try { return new URLSearchParams(location.search).get(name); } catch(_) { return null; }
  }
  async function handleDemoFinal() {
    if (!state.themes.length) {
      try { const r = await api('GET', '/api/themes'); if (r.ok) state.themes = (await r.json()).themes || []; } catch(_) {}
    }
    state.session = { my_team_slug: 'brazil', total_tokens_won: 420, session_complete: true };
    renderVictoryStadium({ interstitial: 'final_win', jackpot_paid: 0, prize_paid: 96, new_stage_idx: 7 });
  }

  async function init() {
    // Load themes globally for use across screens
    try {
      const r = await api('GET', '/api/themes');
      if (r.ok) { const d = await r.json(); state.themes = d.themes || []; }
    } catch {}

    // On load: check session then route
    try {
      const r = await api('GET', '/api/session');
      if (r.ok) {
        const d = await r.json();
        state.session = d.session;
        state.walletBalance = d.wallet_balance || 1000;
        state.potBalance = d.captain_pot_balance || 100;
        state.prevPotBalance = state.potBalance;
        // Seed from the server's most recent win so a fresh page load doesn't
        // fire a phantom "just won" broadcast on the first poll.
        state.potLastWonAt = d.last_won_at || null;

        // If active game in session, go straight there
        if (d.session && d.session.current_game_id && !d.session.session_complete) {
          navigate('#game/' + d.session.current_game_id);
          return;
        }
      }
    } catch {}

    // Demo triggers (staging review aids) — pure client-side UI states, so they
    // work against an empty DB. Harmless no-op shells in prod if ever appended.
    const demo = getQueryParam('demo');
    if (demo === 'final') { await handleDemoFinal(); return; }

    route();

    if (demo === 'topup') {
      setTimeout(() => { showPotTopupPopup(3, potTopupEnteringStage(3)); }, 400);
    } else if (demo === 'info') {
      setTimeout(() => { showInfoPanel(); }, 400);
    }

    // Staging debug indicator — shows token presence in bottom-left corner
    fetch('/api/env').then(r => r.json()).then(d => {
      if (!d.staging) return;
      const pill = document.getElementById('auth-debug');
      if (!pill) return;
      const tok = getToken();
      pill.textContent = tok ? 'token ✓' : 'token ✗';
      pill.style.color = tok ? '#4ade80' : '#f87171';
      pill.style.display = 'block';
    }).catch(() => {});
  }

  init();
  </script>
<div id="auth-debug" style="display:none;position:fixed;bottom:6px;left:6px;z-index:9999;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:2px 7px;font-size:0.6rem;font-family:monospace;color:#a1a1aa;pointer-events:none;line-height:1.5;"></div>
</body>
